<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Mass Visualization — Normal</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;500&display=swap');

  :root {
    --bg: #ffffff;
    --surface: #f7f7f7;
    --text: #2c2a26;
    --text-dim: #6b6560;
    --accent: #9E1B32;
    --accent-glow: rgba(158, 27, 50, 0.15);
    --axis: #a09888;
    --scan: #cc3344;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }

  .container { width: 100%; max-width: 960px; }

  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .header h1 {
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 300;
    font-size: 1.25rem;
    letter-spacing: 0.02em;
  }

  .stats {
    display: flex;
    gap: 2rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
  }

  .stat-group label {
    color: var(--text-dim);
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 0.2rem;
  }

  .stat-group span {
    font-weight: 600;
    color: var(--text);
    font-size: 0.95rem;
  }

  .formula-bar {
    display: flex;
    align-items: center;
    gap: 1.2rem;
    margin-bottom: 1.25rem;
    padding: 0.75rem 1.25rem;
    background: rgba(158, 27, 50, 0.06);
    border: 1px solid rgba(158, 27, 50, 0.15);
    border-radius: 6px;
    flex-wrap: wrap;
  }

  .formula-bar .katex { font-size: 0.95rem; color: var(--text); }

  .canvas-wrap {
    position: relative;
    background: var(--surface);
    border-radius: 8px;
    padding: 2rem 2.5rem 3rem;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.04);
  }

  canvas { display: block; width: 100%; height: auto; cursor: crosshair; }

  .controls {
    margin-top: 1.5rem;
    display: flex;
    gap: 1.2rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .control-group {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .control-group label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100px;
    height: 4px;
    background: var(--axis);
    border-radius: 2px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 8px var(--accent-glow);
  }

  .value-display {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--accent);
    min-width: 3ch;
    text-align: right;
  }

  .btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.5rem 1.2rem;
    background: transparent;
    border: 1px solid var(--axis);
    color: var(--text-dim);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 12px var(--accent-glow);
  }

  .btn-scan {
    border-color: var(--scan);
    color: var(--scan);
  }

  .btn-scan:hover {
    box-shadow: 0 0 12px rgba(204, 51, 68, 0.2);
  }

  .tooltip {
    position: absolute;
    pointer-events: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    background: rgba(255, 255, 255, 0.96);
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid var(--axis);
    opacity: 0;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>PDF Mass Visualization</h1>
    <div class="stats">
      <div class="stat-group">
        <label>Distribution</label>
        <span>Normal</span>
      </div>
      <div class="stat-group">
        <label>μ</label>
        <span id="muLabel">0.00</span>
      </div>
      <div class="stat-group">
        <label>σ</label>
        <span id="sigLabel">1.00</span>
      </div>
      <div class="stat-group">
        <label>σ²</label>
        <span id="varLabel">1.00</span>
      </div>
    </div>
  </div>

  <div class="formula-bar">
    <span id="formulaPdf"></span>
    <span style="margin-left: 1.2rem;" id="formulaCdf"></span>
    <span style="margin-left: 1.2rem;" id="formulaEcdf"></span>
  </div>

  <div class="canvas-wrap">
    <canvas id="plot" width="1800" height="850"></canvas>
    <div class="tooltip" id="tooltip"></div>
  </div>

  <div class="controls">
    <div class="control-group">
      <label>μ</label>
      <input type="range" id="muSlider" min="-4" max="4" step="0.1" value="0">
      <span class="value-display" id="muVal">0.0</span>
    </div>
    <div class="control-group">
      <label>σ</label>
      <input type="range" id="sigSlider" min="0.3" max="3" step="0.1" value="1">
      <span class="value-display" id="sigVal">1.0</span>
    </div>
    <div class="control-group">
      <label>N</label>
      <input type="range" id="nSlider" min="50" max="50000" step="50" value="5000">
      <span class="value-display" id="nVal">5k</span>
    </div>
    <button class="btn" id="redrawBtn">Redraw</button>
    <button class="btn btn-scan" id="scanBtn">▶ Scan CDF</button>
    <div class="control-group">
      <label>Speed</label>
      <input type="range" id="speedSlider" min="1" max="10" step="1" value="4">
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('plot');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');

let mu = 0, sigma = 1;
let N = 5000;
let particles = [];
let sortedX = [];
let scanX = null;
let scanAnim = null;

// Visible x range: μ ± 4.5σ, but at least [-6, 6]
let xLo, xHi;
function updateRange() {
  xLo = Math.min(mu - 4.5 * sigma, -6);
  xHi = Math.max(mu + 4.5 * sigma, 6);
}
updateRange();

const PAD = { left: 50, right: 30, top: 510, bottom: 50 };

function canvasX(x) {
  return PAD.left + ((x - xLo) / (xHi - xLo)) * (canvas.width - PAD.left - PAD.right);
}
function canvasY(y) {
  const plotH = canvas.height - PAD.top - PAD.bottom;
  const mid = PAD.top + plotH / 2;
  return mid - y * plotH;
}

// ─── Normal math ───
const SQRT2PI = Math.sqrt(2 * Math.PI);

function normalPdf(x) {
  const z = (x - mu) / sigma;
  return Math.exp(-0.5 * z * z) / (sigma * SQRT2PI);
}

// Abramowitz & Stegun rational approx for Φ(x)
function stdNormalCdf(x) {
  if (x < -8) return 0;
  if (x > 8) return 1;
  const neg = x < 0;
  if (neg) x = -x;
  const p = 0.2316419;
  const b1 = 0.319381530, b2 = -0.356563782, b3 = 1.781477937, b4 = -1.821255978, b5 = 1.330274429;
  const t = 1 / (1 + p * x);
  const t2 = t * t, t3 = t2 * t, t4 = t3 * t, t5 = t4 * t;
  const pdf = Math.exp(-0.5 * x * x) / SQRT2PI;
  const cdf = 1 - pdf * (b1 * t + b2 * t2 + b3 * t3 + b4 * t4 + b5 * t5);
  return neg ? 1 - cdf : cdf;
}

function normalCdf(x) {
  return stdNormalCdf((x - mu) / sigma);
}

// Box-Muller
function randNormal() {
  let u, v, s;
  do {
    u = Math.random() * 2 - 1;
    v = Math.random() * 2 - 1;
    s = u * u + v * v;
  } while (s >= 1 || s === 0);
  return mu + sigma * u * Math.sqrt(-2 * Math.log(s) / s);
}

function generateParticles() {
  particles = [];
  for (let i = 0; i < N; i++) {
    particles.push({
      x: randNormal(),
      y: (Math.random() - 0.5) * 0.35
    });
  }
  sortedX = particles.map(p => p.x).sort((a, b) => a - b);
}

// ─── Axis ───
function drawAxis() {
  const y0 = canvasY(0);
  const x0 = canvasX(xLo);
  const xEnd = canvasX(xHi);

  // Dashed center line
  ctx.setLineDash([12, 8]);
  ctx.strokeStyle = '#a0988c';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(xEnd, y0); ctx.stroke();
  ctx.setLineDash([]);

  // X-axis at bottom
  const axisY = canvas.height - PAD.bottom;
  ctx.strokeStyle = '#a09888';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(x0, axisY); ctx.lineTo(xEnd, axisY); ctx.stroke();

  // Ticks — at μ and μ ± kσ
  ctx.fillStyle = '#5a5248';
  ctx.font = '600 20px "IBM Plex Mono", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';

  const ticks = [];
  for (let k = -4; k <= 4; k++) {
    const v = mu + k * sigma;
    if (v >= xLo && v <= xHi) ticks.push({ v, label: k === 0 ? 'μ' : `μ${k > 0 ? '+' : ''}${k}σ` });
  }
  // Simplify labels for standard case
  for (const t of ticks) {
    const tx = canvasX(t.v);
    ctx.strokeStyle = '#a09888';
    ctx.beginPath(); ctx.moveTo(tx, axisY); ctx.lineTo(tx, axisY + 8); ctx.stroke();
    // Show numeric value below label
    ctx.fillStyle = '#5a5248';
    ctx.font = '500 16px "IBM Plex Mono", monospace';
    ctx.fillText(t.label, tx, axisY + 12);
    ctx.fillStyle = '#8a8078';
    ctx.font = '400 13px "IBM Plex Mono", monospace';
    ctx.fillText(t.v.toFixed(1), tx, axisY + 30);
  }

  // μ label on the center line
  ctx.font = '400 20px "IBM Plex Mono", monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#8a8078';
  const muPx = canvasX(mu);
  ctx.fillText('μ = ' + mu.toFixed(1), muPx + 8, y0 + 14);
}

// ─── Cloud ───
function drawCloudWithScan() {
  const rO = N < 200 ? 7 : N < 1000 ? 4.5 : 3.5;
  const rI = N < 200 ? 4 : N < 1000 ? 2.5 : 2.0;
  const aOOn = N < 200 ? 0.40 : N < 1000 ? 0.22 : 0.12;
  const aOOff = N < 200 ? 0.22 : N < 1000 ? 0.10 : 0.05;
  const aIOn = N < 200 ? 0.55 : N < 1000 ? 0.30 : 0.12;
  const aIOff = N < 200 ? 0.30 : N < 1000 ? 0.15 : 0.05;

  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    if (p.x < xLo || p.x > xHi) continue;
    const cx = canvasX(p.x), cy = canvasY(p.y);
    const on = scanX !== null && p.x <= scanX;
    ctx.beginPath(); ctx.arc(cx, cy, rO, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(158, 27, 50, ${on ? aOOn : aOOff})`; ctx.fill();
  }
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    if (p.x < xLo || p.x > xHi) continue;
    const cx = canvasX(p.x), cy = canvasY(p.y);
    const on = scanX !== null && p.x <= scanX;
    ctx.beginPath(); ctx.arc(cx, cy, rI, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(130, 20, 42, ${on ? aIOn : aIOff})`; ctx.fill();
  }
}

// ─── Scan line ───
function drawScanLine() {
  if (scanX === null) return;
  const sx = canvasX(Math.min(Math.max(scanX, xLo), xHi));
  const y0 = PAD.top, y1 = canvas.height - PAD.bottom;

  ctx.save();
  ctx.shadowColor = 'rgba(204, 51, 68, 0.4)';
  ctx.shadowBlur = 16;
  ctx.strokeStyle = 'rgba(204, 51, 68, 0.75)';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(sx, y0); ctx.lineTo(sx, y1); ctx.stroke();
  ctx.restore();

  ctx.strokeStyle = 'rgba(204, 51, 68, 0.9)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(sx, y0); ctx.lineTo(sx, y1); ctx.stroke();

  ctx.fillStyle = 'rgba(204, 51, 68, 0.9)';
  ctx.font = '600 20px "IBM Plex Mono", monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.fillText('scan', sx, y0 - 4);
}

// ════════════════════════════════════════
// Three panels
// ════════════════════════════════════════
const PANEL = {
  gap: 16, ih: 450, iy: 12,
  ip: { left: 50, right: 16, top: 44, bottom: 44 },
  get panelW() { return (canvas.width - 40 - this.gap * 2) / 3; }
};

function pox(idx) { return 20 + idx * (PANEL.panelW + PANEL.gap); }

function drawPanelBg(ix, bc) {
  ctx.save(); ctx.globalAlpha = 0.92; ctx.fillStyle = '#f0f0f0';
  ctx.beginPath(); ctx.roundRect(ix, PANEL.iy, PANEL.panelW, PANEL.ih, 8); ctx.fill();
  ctx.restore();
  ctx.strokeStyle = bc; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(ix, PANEL.iy, PANEL.panelW, PANEL.ih, 8); ctx.stroke();
}

function bnd(ix) {
  const px0 = ix + PANEL.ip.left, px1 = ix + PANEL.panelW - PANEL.ip.right;
  const py0 = PANEL.iy + PANEL.ip.top, py1 = PANEL.iy + PANEL.ih - PANEL.ip.bottom;
  return { px0, px1, py0, py1, pw: px1 - px0, ph: py1 - py0 };
}

function drawPA(b) {
  ctx.strokeStyle = 'rgba(120, 110, 100, 0.4)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(b.px0, b.py1); ctx.lineTo(b.px1, b.py1); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(b.px0, b.py0); ctx.lineTo(b.px0, b.py1); ctx.stroke();
}

function drawPXT(b) {
  ctx.fillStyle = 'rgba(90, 80, 70, 0.6)';
  ctx.font = '400 13px "IBM Plex Mono", monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  // Show ticks at μ-3σ, μ, μ+3σ
  const tickVals = [mu - 3 * sigma, mu, mu + 3 * sigma];
  for (const v of tickVals) {
    if (v < xLo || v > xHi) continue;
    const tx = b.px0 + ((v - xLo) / (xHi - xLo)) * b.pw;
    ctx.fillText(v.toFixed(1), tx, b.py1 + 5);
    ctx.strokeStyle = 'rgba(120, 110, 100, 0.4)';
    ctx.beginPath(); ctx.moveTo(tx, b.py1); ctx.lineTo(tx, b.py1 + 4); ctx.stroke();
  }
}

function pSL(b) {
  if (scanX === null) return;
  const clamped = Math.min(Math.max(scanX, xLo), xHi);
  const sx = b.px0 + ((clamped - xLo) / (xHi - xLo)) * b.pw;
  if (sx >= b.px0 && sx <= b.px1) {
    ctx.strokeStyle = 'rgba(204, 51, 68, 0.4)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(sx, b.py0); ctx.lineTo(sx, b.py1); ctx.stroke();
  }
}

// Panel x position for a value
function pValX(b, v) {
  return b.px0 + ((v - xLo) / (xHi - xLo)) * b.pw;
}

// ─── PANEL 1: f(x) ───
function drawPdfInset() {
  const ix = pox(0);
  drawPanelBg(ix, 'rgba(158, 27, 50, 0.2)');
  const b = bnd(ix);
  const peakPdf = normalPdf(mu);
  const yMax = peakPdf * 1.2;

  ctx.fillStyle = 'rgba(60, 55, 48, 0.7)';
  ctx.font = '500 20px "IBM Plex Mono", monospace';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText('f(x)', ix + PANEL.ip.left, PANEL.iy + 12);

  drawPA(b); drawPXT(b);

  // Peak label
  const peakY = b.py0 + (1 - peakPdf / yMax) * b.ph;
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(90, 80, 70, 0.6)';
  ctx.font = '400 12px "IBM Plex Mono", monospace';
  ctx.fillText(peakPdf.toFixed(2), b.px0 - 5, peakY);
  ctx.setLineDash([5, 5]);
  ctx.strokeStyle = 'rgba(158, 27, 50, 0.2)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(b.px0, peakY); ctx.lineTo(b.px1, peakY); ctx.stroke();
  ctx.setLineDash([]);

  // Shaded area up to scan
  if (scanX !== null) {
    const clipX = Math.min(Math.max(scanX, xLo), xHi);
    ctx.beginPath();
    const steps = 150;
    for (let i = 0; i <= steps; i++) {
      const xv = xLo + (i / steps) * (clipX - xLo);
      const yv = normalPdf(xv);
      const sx = pValX(b, xv), sy = b.py0 + (1 - yv / yMax) * b.ph;
      i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
    }
    ctx.lineTo(pValX(b, clipX), b.py1);
    ctx.lineTo(b.px0, b.py1);
    ctx.closePath();
    ctx.fillStyle = 'rgba(204, 51, 68, 0.12)';
    ctx.fill();
  }

  // Full curve
  ctx.beginPath();
  const steps = 300;
  for (let i = 0; i <= steps; i++) {
    const xv = xLo + (i / steps) * (xHi - xLo);
    const yv = normalPdf(xv);
    const sx = pValX(b, xv), sy = b.py0 + (1 - yv / yMax) * b.ph;
    i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
  }
  ctx.strokeStyle = 'rgba(158, 27, 50, 0.85)'; ctx.lineWidth = 2.5;
  ctx.stroke();

  // Faint fill
  ctx.lineTo(b.px1, b.py1); ctx.lineTo(b.px0, b.py1); ctx.closePath();
  ctx.fillStyle = 'rgba(158, 27, 50, 0.05)'; ctx.fill();

  pSL(b);
}

// ─── PANEL 2: F(x) ───
function drawCdfInset() {
  const ix = pox(1);
  drawPanelBg(ix, 'rgba(95, 106, 114, 0.2)');
  const b = bnd(ix);
  const yMax = 1.08;

  ctx.fillStyle = 'rgba(60, 55, 48, 0.7)';
  ctx.font = '500 20px "IBM Plex Mono", monospace';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText('F(x)', ix + PANEL.ip.left, PANEL.iy + 12);

  drawPA(b); drawPXT(b);

  // Y ticks
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(90, 80, 70, 0.6)';
  for (const yt of [0.5, 1.0]) {
    const yy = b.py0 + (1 - yt / yMax) * b.ph;
    ctx.fillText(yt.toFixed(1), b.px0 - 5, yy);
    ctx.setLineDash([4, 5]);
    ctx.strokeStyle = 'rgba(95, 106, 114, 0.18)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(b.px0, yy); ctx.lineTo(b.px1, yy); ctx.stroke();
    ctx.setLineDash([]);
  }

  // Φ curve
  ctx.beginPath();
  for (let i = 0; i <= 300; i++) {
    const xv = xLo + (i / 300) * (xHi - xLo);
    const Fv = normalCdf(xv);
    const sx = pValX(b, xv), sy = b.py0 + (1 - Fv / yMax) * b.ph;
    i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
  }
  ctx.strokeStyle = 'rgba(95, 106, 114, 0.85)'; ctx.lineWidth = 2.5;
  ctx.stroke();

  pSL(b);

  if (scanX !== null) {
    const xc = Math.min(Math.max(scanX, xLo), xHi);
    const Fs = normalCdf(xc);
    const dx = pValX(b, xc), dy = b.py0 + (1 - Fs / yMax) * b.ph;
    ctx.beginPath(); ctx.arc(dx, dy, 5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(204, 51, 68, 0.9)'; ctx.fill();

    ctx.fillStyle = 'rgba(95, 106, 114, 0.85)';
    ctx.font = '600 16px "IBM Plex Mono", monospace';
    ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
    ctx.fillText(`F = ${Fs.toFixed(3)}`, b.px0 + b.pw * 0.55, b.py0 + 16);
  }
}

// ─── PANEL 3: F̂(x) ───
function drawEcdfInset() {
  const ix = pox(2);
  drawPanelBg(ix, 'rgba(30, 80, 160, 0.18)');
  const b = bnd(ix);
  const yMax = 1.08;

  ctx.fillStyle = 'rgba(60, 55, 48, 0.7)';
  ctx.font = '500 20px "IBM Plex Mono", monospace';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText('F̂(x)', ix + PANEL.ip.left, PANEL.iy + 12);

  drawPA(b); drawPXT(b);

  // Y ticks
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(90, 80, 70, 0.6)';
  for (const yt of [0.5, 1.0]) {
    const yy = b.py0 + (1 - yt / yMax) * b.ph;
    ctx.fillText(yt.toFixed(1), b.px0 - 5, yy);
    ctx.setLineDash([4, 5]);
    ctx.strokeStyle = 'rgba(30, 80, 160, 0.15)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(b.px0, yy); ctx.lineTo(b.px1, yy); ctx.stroke();
    ctx.setLineDash([]);
  }

  // Faint theoretical CDF
  ctx.beginPath();
  for (let i = 0; i <= 200; i++) {
    const xv = xLo + (i / 200) * (xHi - xLo);
    const Fv = normalCdf(xv);
    const sx = pValX(b, xv), sy = b.py0 + (1 - Fv / yMax) * b.ph;
    i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
  }
  ctx.strokeStyle = 'rgba(95, 106, 114, 0.2)'; ctx.lineWidth = 1.5;
  ctx.stroke();

  if (scanX === null) return;

  const n = sortedX.length;
  const drawUpTo = Math.min(Math.max(scanX, xLo), xHi);

  let countBelow = 0;
  for (let i = 0; i < n; i++) {
    if (sortedX[i] <= drawUpTo) countBelow = i + 1; else break;
  }

  ctx.beginPath();
  let prevPy = b.py0 + b.ph; // F̂ = 0
  ctx.moveTo(b.px0, prevPy);

  const maxSteps = 600;
  const stepSize = Math.max(1, Math.floor(countBelow / maxSteps));

  for (let i = 0; i < countBelow; i += stepSize) {
    const xv = sortedX[i];
    if (xv < xLo || xv > xHi) continue;
    const Fhat = (i + 1) / n;
    const sx = pValX(b, xv), sy = b.py0 + (1 - Fhat / yMax) * b.ph;
    ctx.lineTo(sx, prevPy);
    ctx.lineTo(sx, sy);
    prevPy = sy;
  }

  const endPx = pValX(b, drawUpTo);
  ctx.lineTo(endPx, prevPy);
  ctx.strokeStyle = 'rgba(30, 80, 160, 0.85)'; ctx.lineWidth = 2;
  ctx.stroke();

  const Fhat = countBelow / n;
  ctx.beginPath(); ctx.arc(endPx, prevPy, 5.5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(204, 51, 68, 0.9)'; ctx.fill();

  pSL(b);

  ctx.fillStyle = 'rgba(204, 51, 68, 0.9)';
  ctx.font = '600 16px "IBM Plex Mono", monospace';
  ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
  ctx.fillText(`F̂ = ${Fhat.toFixed(3)}`, b.px0 + b.pw * 0.55, b.py0 + 16);
}

// ─── Full render ───
function fullDraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawAxis();
  drawCloudWithScan();
  drawScanLine();
  drawPdfInset();
  drawCdfInset();
  drawEcdfInset();
}

// ─── Scan ───
function startScan() {
  if (scanAnim) cancelAnimationFrame(scanAnim);
  const speed = parseInt(document.getElementById('speedSlider').value);
  const totalFrames = Math.round(400 / speed);
  let frame = 0;
  const s0 = xLo - 0.5, s1 = xHi + 0.5;

  function step() {
    scanX = s0 + (s1 - s0) * (frame / totalFrames);
    fullDraw();
    frame++;
    if (frame <= totalFrames) scanAnim = requestAnimationFrame(step);
    else { scanX = s1; fullDraw(); }
  }
  step();
}

// ─── Controls ───
const muSlider = document.getElementById('muSlider');
const sigSlider = document.getElementById('sigSlider');
const nSlider = document.getElementById('nSlider');
const muVal = document.getElementById('muVal');
const sigVal = document.getElementById('sigVal');
const nValEl = document.getElementById('nVal');

function updateLabels() {
  muVal.textContent = parseFloat(muSlider.value).toFixed(1);
  sigVal.textContent = parseFloat(sigSlider.value).toFixed(1);
  document.getElementById('muLabel').textContent = parseFloat(muSlider.value).toFixed(2);
  document.getElementById('sigLabel').textContent = parseFloat(sigSlider.value).toFixed(2);
  document.getElementById('varLabel').textContent = (parseFloat(sigSlider.value) ** 2).toFixed(2);
  const n = parseInt(nSlider.value);
  nValEl.textContent = n >= 1000 ? (n / 1000).toFixed(0) + 'k' : n;
}

muSlider.addEventListener('input', () => { updateLabels(); renderFormulas(); });
sigSlider.addEventListener('input', () => { updateLabels(); renderFormulas(); });
nSlider.addEventListener('input', updateLabels);

document.getElementById('redrawBtn').addEventListener('click', () => {
  if (scanAnim) cancelAnimationFrame(scanAnim);
  scanX = null;
  mu = parseFloat(muSlider.value);
  sigma = parseFloat(sigSlider.value);
  N = parseInt(nSlider.value);
  updateRange();
  generateParticles();
  fullDraw();
});

document.getElementById('scanBtn').addEventListener('click', startScan);

// Tooltip
const wrap = document.querySelector('.canvas-wrap');
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const mx = (e.clientX - rect.left) * scaleX;
  const plotW = canvas.width - PAD.left - PAD.right;
  const xVal = xLo + ((mx - PAD.left) / plotW) * (xHi - xLo);
  if (xVal >= xLo && xVal <= xHi) {
    const f = normalPdf(xVal);
    const F = normalCdf(xVal);
    tooltip.textContent = `x = ${xVal.toFixed(2)}   f(x) = ${f.toFixed(4)}   Φ = ${F.toFixed(4)}`;
    tooltip.style.left = (e.clientX - wrap.getBoundingClientRect().left + 12) + 'px';
    tooltip.style.top = (e.clientY - wrap.getBoundingClientRect().top - 30) + 'px';
    tooltip.style.opacity = 1;
  } else { tooltip.style.opacity = 0; }
});
canvas.addEventListener('mouseleave', () => { tooltip.style.opacity = 0; });

// Formulas
function renderFormulas() {
  const mv = parseFloat(muSlider.value), sv = parseFloat(sigSlider.value);
  katex.render(
    `f(x) = \\frac{1}{\\sqrt{2\\pi}\\,\\sigma}\\,e^{-\\frac{(x-\\mu)^2}{2\\sigma^2}}`,
    document.getElementById('formulaPdf'),
    { throwOnError: false }
  );
  katex.render(
    String.raw`F(x) = \Phi\!\left(\frac{x - \mu}{\sigma}\right)`,
    document.getElementById('formulaCdf'),
    { throwOnError: false }
  );
  katex.render(
    String.raw`\hat{F}_n(x) = \frac{1}{n}\sum_{i=1}^{n}\mathbf{1}(X_i \leq x)`,
    document.getElementById('formulaEcdf'),
    { throwOnError: false }
  );
}
renderFormulas();

// Init
generateParticles();
fullDraw();
</script>
