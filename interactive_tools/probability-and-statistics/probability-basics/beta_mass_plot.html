<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Mass Visualization — Beta</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;500&display=swap');

  :root {
    --bg: #ffffff;
    --surface: #f7f7f7;
    --text: #2c2a26;
    --text-dim: #6b6560;
    --accent: #9E1B32;
    --accent-glow: rgba(158, 27, 50, 0.15);
    --axis: #a09888;
    --scan: #cc3344;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }

  .container { width: 100%; max-width: 960px; }

  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .header h1 {
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 300;
    font-size: 1.25rem;
    letter-spacing: 0.02em;
  }

  .stats {
    display: flex;
    gap: 1.8rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
  }

  .stat-group label {
    color: var(--text-dim);
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 0.2rem;
  }

  .stat-group span {
    font-weight: 600;
    color: var(--text);
    font-size: 0.9rem;
  }

  .formula-bar {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.25rem;
    padding: 0.75rem 1.25rem;
    background: rgba(158, 27, 50, 0.06);
    border: 1px solid rgba(158, 27, 50, 0.15);
    border-radius: 6px;
    flex-wrap: wrap;
  }

  .formula-bar .katex { font-size: 0.88rem; color: var(--text); }

  .canvas-wrap {
    position: relative;
    background: var(--surface);
    border-radius: 8px;
    padding: 2rem 2.5rem 3rem;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.04);
  }

  canvas { display: block; width: 100%; height: auto; cursor: crosshair; }

  .controls {
    margin-top: 1.5rem;
    display: flex;
    gap: 1.2rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .control-group {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .control-group label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 90px;
    height: 4px;
    background: var(--axis);
    border-radius: 2px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 8px var(--accent-glow);
  }

  .value-display {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--accent);
    min-width: 3ch;
    text-align: right;
  }

  .btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.5rem 1.2rem;
    background: transparent;
    border: 1px solid var(--axis);
    color: var(--text-dim);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 12px var(--accent-glow);
  }

  .btn-scan { border-color: var(--scan); color: var(--scan); }
  .btn-scan:hover { box-shadow: 0 0 12px rgba(204, 51, 68, 0.2); }

  .tooltip {
    position: absolute;
    pointer-events: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    background: rgba(255, 255, 255, 0.96);
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid var(--axis);
    opacity: 0;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>PDF Mass Visualization</h1>
    <div class="stats">
      <div class="stat-group">
        <label>Distribution</label>
        <span>Beta</span>
      </div>
      <div class="stat-group">
        <label>α</label>
        <span id="aLabel">2.00</span>
      </div>
      <div class="stat-group">
        <label>β</label>
        <span id="bLabel">5.00</span>
      </div>
      <div class="stat-group">
        <label>E[X]</label>
        <span id="meanLabel">0.286</span>
      </div>
      <div class="stat-group">
        <label>Var</label>
        <span id="varLabel">0.026</span>
      </div>
      <div class="stat-group">
        <label>Support</label>
        <span>(0, 1)</span>
      </div>
    </div>
  </div>

  <div class="formula-bar">
    <span id="formulaPdf"></span>
    <span style="margin-left: 0.8rem;" id="formulaCdf"></span>
    <span style="margin-left: 0.8rem;" id="formulaEcdf"></span>
  </div>

  <div class="canvas-wrap">
    <canvas id="plot" width="1800" height="850"></canvas>
    <div class="tooltip" id="tooltip"></div>
  </div>

  <div class="controls">
    <div class="control-group">
      <label>α</label>
      <input type="range" id="aSlider" min="0.1" max="10" step="0.1" value="2">
      <span class="value-display" id="aVal">2.0</span>
    </div>
    <div class="control-group">
      <label>β</label>
      <input type="range" id="bSlider" min="0.1" max="10" step="0.1" value="5">
      <span class="value-display" id="bVal">5.0</span>
    </div>
    <div class="control-group">
      <label>N</label>
      <input type="range" id="nSlider" min="50" max="50000" step="50" value="5000">
      <span class="value-display" id="nVal">5k</span>
    </div>
    <button class="btn" id="redrawBtn">Redraw</button>
    <button class="btn btn-scan" id="scanBtn">▶ Scan CDF</button>
    <div class="control-group">
      <label>Speed</label>
      <input type="range" id="speedSlider" min="1" max="10" step="1" value="4">
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('plot');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');

let a = 2, b = 5;
let N = 5000;
let particles = [];
let sortedX = [];
let scanX = null;
let scanAnim = null;

const PAD = { left: 50, right: 30, top: 510, bottom: 50 };

function canvasX(x) {
  return PAD.left + x * (canvas.width - PAD.left - PAD.right);
}
function canvasY(y) {
  const plotH = canvas.height - PAD.top - PAD.bottom;
  const mid = PAD.top + plotH / 2;
  return mid - y * plotH;
}

// ═══════════════════════════════════
// Beta math
// ═══════════════════════════════════

function logGamma(x) {
  const g = 7;
  const c = [
    0.99999999999980993, 676.5203681218851, -1259.1392167224028,
    771.32342877765313, -176.61502916214059, 12.507343278686905,
    -0.13857109526572012, 9.9843695780195716e-6, 1.5056327351493116e-7
  ];
  if (x < 0.5) return Math.log(Math.PI / Math.sin(Math.PI * x)) - logGamma(1 - x);
  x -= 1;
  let t = x + g + 0.5;
  let s = c[0];
  for (let i = 1; i < g + 2; i++) s += c[i] / (x + i);
  return 0.5 * Math.log(2 * Math.PI) + (x + 0.5) * Math.log(t) - t + Math.log(s);
}

function logBeta(a, b) {
  return logGamma(a) + logGamma(b) - logGamma(a + b);
}

function betaPdf(x) {
  if (x <= 0 || x >= 1) return 0;
  return Math.exp((a - 1) * Math.log(x) + (b - 1) * Math.log(1 - x) - logBeta(a, b));
}

// Regularized incomplete beta via continued fraction
function betaCDF(x) {
  if (x <= 0) return 0;
  if (x >= 1) return 1;
  // Use symmetry: if x > (a+1)/(a+b+2), compute 1 - I_{1-x}(b, a)
  if (x > (a + 1) / (a + b + 2)) return 1 - betaIncCF(1 - x, b, a);
  return betaIncCF(x, a, b);
}

function betaIncCF(x, aa, bb) {
  const lnPre = aa * Math.log(x) + bb * Math.log(1 - x) - logBeta(aa, bb) - Math.log(aa);
  const pre = Math.exp(lnPre);
  // Lentz continued fraction
  let c = 1, d = 1 - (aa + bb) * x / (aa + 1);
  if (Math.abs(d) < 1e-30) d = 1e-30;
  d = 1 / d;
  let h = d;
  for (let m = 1; m <= 200; m++) {
    // Even step
    let num = m * (bb - m) * x / ((aa + 2 * m - 1) * (aa + 2 * m));
    d = 1 + num * d; if (Math.abs(d) < 1e-30) d = 1e-30; d = 1 / d;
    c = 1 + num / c; if (Math.abs(c) < 1e-30) c = 1e-30;
    h *= d * c;
    // Odd step
    num = -(aa + m) * (aa + bb + m) * x / ((aa + 2 * m) * (aa + 2 * m + 1));
    d = 1 + num * d; if (Math.abs(d) < 1e-30) d = 1e-30; d = 1 / d;
    c = 1 + num / c; if (Math.abs(c) < 1e-30) c = 1e-30;
    const delta = d * c;
    h *= delta;
    if (Math.abs(delta - 1) < 1e-12) break;
  }
  return pre * h * aa; // wait, let me recalculate
}

// Actually, cleaner implementation of regularized incomplete beta
function betaCDFv2(x) {
  if (x <= 0) return 0;
  if (x >= 1) return 1;
  if (x > (a + 1) / (a + b + 2)) return 1 - betaCDFv2Core(1 - x, b, a);
  return betaCDFv2Core(x, a, b);
}

function betaCDFv2Core(x, aa, bb) {
  const front = Math.exp(aa * Math.log(x) + bb * Math.log(1 - x) - logBeta(aa, bb));
  // Continued fraction
  let f = 1, c = 1, d = 0;
  for (let i = 0; i <= 200; i++) {
    let num;
    if (i === 0) {
      num = 1;
    } else if (i % 2 === 1) {
      const m = (i - 1) / 2;
      num = (m + 1) * (bb - m - 1) * x / ((aa + 2 * m + 1) * (aa + 2 * m + 2));
    } else {
      const m = i / 2;
      num = m * (aa + m) * x / ((aa + 2 * m - 1) * (aa + 2 * m)); // Hmm
    }
    // Actually let me use the standard Lentz method properly
  }
  // Fallback: use series expansion for small x
  return betaIncSeries(x, aa, bb);
}

function betaIncSeries(x, aa, bb) {
  // I_x(a,b) = x^a (1-x)^b / (a B(a,b)) * sum_{n=0}^inf B(a+1, n+1)/B(b, n+1) * x^n ... 
  // Actually just use the simple series: I_x(a,b) = x^a / (a B(a,b)) * sum (1-b)_n / (a+n) / n! * x^n
  // Better: use the regularized incomplete beta via the series for small x
  const lnPre = aa * Math.log(x) + bb * Math.log(1 - x) - logBeta(aa, bb);
  // Gauss hypergeometric: I_x(a,b) = x^a / (a*B(a,b)) * 2F1(a, 1-b; a+1; x)
  let sum = 1 / aa;
  let term = 1;
  for (let n = 0; n < 300; n++) {
    term *= (n + aa) * x / (n + aa + 1); // Not quite right
    // Proper: sum = sum_{n=0}^inf  prod_{j=0}^{n-1}(1-b+j) / (n! * (a+n)) * x^n  ... 
    // Let me just do the straightforward recurrence
    break;
  }
  // OK let me just implement a clean version from scratch
  return betaRegClean(x, aa, bb);
}

function betaRegClean(x, aa, bb) {
  // Regularized incomplete beta I_x(a,b) via continued fraction (Numerical Recipes style)
  const bt = (x === 0 || x === 1) ? 0 :
    Math.exp(aa * Math.log(x) + bb * Math.log(1 - x) - logBeta(aa, bb));
  if (x < (aa + 1) / (aa + bb + 2)) {
    return bt * betaCF(x, aa, bb) / aa;
  }
  return 1 - bt * betaCF(1 - x, bb, aa) / bb;
}

function betaCF(x, aa, bb) {
  const MAXIT = 200, EPS = 1e-14, FPMIN = 1e-30;
  let qab = aa + bb, qap = aa + 1, qam = aa - 1;
  let c = 1, d = 1 - qab * x / qap;
  if (Math.abs(d) < FPMIN) d = FPMIN;
  d = 1 / d;
  let h = d;
  for (let m = 1; m <= MAXIT; m++) {
    const m2 = 2 * m;
    // Even
    let an = m * (bb - m) * x / ((qam + m2) * (aa + m2));
    d = 1 + an * d; if (Math.abs(d) < FPMIN) d = FPMIN; d = 1 / d;
    c = 1 + an / c; if (Math.abs(c) < FPMIN) c = FPMIN;
    h *= d * c;
    // Odd
    an = -(aa + m) * (qab + m) * x / ((aa + m2) * (qap + m2));
    d = 1 + an * d; if (Math.abs(d) < FPMIN) d = FPMIN; d = 1 / d;
    c = 1 + an / c; if (Math.abs(c) < FPMIN) c = FPMIN;
    const del = d * c;
    h *= del;
    if (Math.abs(del - 1) < EPS) break;
  }
  return h;
}

function betaCdfFinal(x) {
  return betaRegClean(x, a, b);
}

// ─── Beta sampling via Gamma: X = G1/(G1+G2) where G1~Gamma(a,1), G2~Gamma(b,1) ───
function randGammaMT(alpha) {
  if (alpha < 1) return randGammaMT(alpha + 1) * Math.pow(Math.random(), 1 / alpha);
  const d = alpha - 1 / 3, c = 1 / Math.sqrt(9 * d);
  while (true) {
    let x, v;
    do {
      const u1 = Math.random(), u2 = Math.random();
      x = Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
      v = 1 + c * x;
    } while (v <= 0);
    v = v * v * v;
    const u = Math.random();
    if (u < 1 - 0.0331 * x * x * x * x) return d * v;
    if (Math.log(u) < 0.5 * x * x + d * (1 - v + Math.log(v))) return d * v;
  }
}

function randBeta() {
  const g1 = randGammaMT(a);
  const g2 = randGammaMT(b);
  return g1 / (g1 + g2);
}

function generateParticles() {
  particles = [];
  for (let i = 0; i < N; i++) {
    particles.push({ x: randBeta(), y: (Math.random() - 0.5) * 0.35 });
  }
  sortedX = particles.map(p => p.x).sort((a, b) => a - b);
}

// ─── Axis ───
function drawAxis() {
  const y0 = canvasY(0);
  const x0 = canvasX(0), xEnd = canvasX(1);

  ctx.setLineDash([12, 8]);
  ctx.strokeStyle = '#a0988c'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(xEnd, y0); ctx.stroke();
  ctx.setLineDash([]);

  const axisY = canvas.height - PAD.bottom;
  ctx.strokeStyle = '#a09888'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(x0, axisY); ctx.lineTo(xEnd, axisY); ctx.stroke();

  ctx.fillStyle = '#5a5248';
  ctx.font = '600 22px "IBM Plex Mono", monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  for (const v of [0, 0.25, 0.5, 0.75, 1]) {
    const tx = canvasX(v);
    ctx.strokeStyle = '#a09888';
    ctx.beginPath(); ctx.moveTo(tx, axisY); ctx.lineTo(tx, axisY + 8); ctx.stroke();
    ctx.fillText(v.toFixed(2), tx, axisY + 12);
  }

  // Mean marker
  const mean = a / (a + b);
  const mx = canvasX(mean);
  ctx.setLineDash([6, 4]);
  ctx.strokeStyle = 'rgba(158, 27, 50, 0.2)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(mx, PAD.top); ctx.lineTo(mx, axisY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#8a8078'; ctx.font = '400 16px "IBM Plex Mono", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('E[X]=' + mean.toFixed(3), mx, y0 + 16);
}

// ─── Cloud ───
function drawCloudWithScan() {
  const rO = N < 200 ? 7 : N < 1000 ? 4.5 : 3.5;
  const rI = N < 200 ? 4 : N < 1000 ? 2.5 : 2.0;
  const aOOn = N < 200 ? 0.40 : N < 1000 ? 0.22 : 0.12;
  const aOOff = N < 200 ? 0.22 : N < 1000 ? 0.10 : 0.05;
  const aIOn = N < 200 ? 0.55 : N < 1000 ? 0.30 : 0.12;
  const aIOff = N < 200 ? 0.30 : N < 1000 ? 0.15 : 0.05;

  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    const cx = canvasX(p.x), cy = canvasY(p.y);
    const on = scanX !== null && p.x <= scanX;
    ctx.beginPath(); ctx.arc(cx, cy, rO, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(158, 27, 50, ${on ? aOOn : aOOff})`; ctx.fill();
  }
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    const cx = canvasX(p.x), cy = canvasY(p.y);
    const on = scanX !== null && p.x <= scanX;
    ctx.beginPath(); ctx.arc(cx, cy, rI, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(130, 20, 42, ${on ? aIOn : aIOff})`; ctx.fill();
  }
}

// ─── Scan line ───
function drawScanLine() {
  if (scanX === null) return;
  const sx = canvasX(Math.min(Math.max(scanX, 0), 1));
  const y0 = PAD.top, y1 = canvas.height - PAD.bottom;

  ctx.save();
  ctx.shadowColor = 'rgba(204, 51, 68, 0.4)'; ctx.shadowBlur = 16;
  ctx.strokeStyle = 'rgba(204, 51, 68, 0.75)'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(sx, y0); ctx.lineTo(sx, y1); ctx.stroke();
  ctx.restore();

  ctx.strokeStyle = 'rgba(204, 51, 68, 0.9)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(sx, y0); ctx.lineTo(sx, y1); ctx.stroke();

  ctx.fillStyle = 'rgba(204, 51, 68, 0.9)';
  ctx.font = '600 20px "IBM Plex Mono", monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.fillText('scan', sx, y0 - 4);
}

// ════════════════════════════════════════
// Three panels
// ════════════════════════════════════════
const PANEL = {
  gap: 16, ih: 450, iy: 12,
  ip: { left: 50, right: 16, top: 44, bottom: 44 },
  get panelW() { return (canvas.width - 40 - this.gap * 2) / 3; }
};

function pox(idx) { return 20 + idx * (PANEL.panelW + PANEL.gap); }

function drawPanelBg(ix, bc) {
  ctx.save(); ctx.globalAlpha = 0.92; ctx.fillStyle = '#f0f0f0';
  ctx.beginPath(); ctx.roundRect(ix, PANEL.iy, PANEL.panelW, PANEL.ih, 8); ctx.fill();
  ctx.restore();
  ctx.strokeStyle = bc; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(ix, PANEL.iy, PANEL.panelW, PANEL.ih, 8); ctx.stroke();
}

function bnd(ix) {
  const px0 = ix + PANEL.ip.left, px1 = ix + PANEL.panelW - PANEL.ip.right;
  const py0 = PANEL.iy + PANEL.ip.top, py1 = PANEL.iy + PANEL.ih - PANEL.ip.bottom;
  return { px0, px1, py0, py1, pw: px1 - px0, ph: py1 - py0 };
}

function drawPA(b) {
  ctx.strokeStyle = 'rgba(120, 110, 100, 0.4)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(b.px0, b.py1); ctx.lineTo(b.px1, b.py1); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(b.px0, b.py0); ctx.lineTo(b.px0, b.py1); ctx.stroke();
}

function drawPXT01(b) {
  ctx.fillStyle = 'rgba(90, 80, 70, 0.6)';
  ctx.font = '400 13px "IBM Plex Mono", monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  for (const v of [0, 0.25, 0.5, 0.75, 1]) {
    const tx = b.px0 + v * b.pw;
    ctx.fillText(v.toFixed(2), tx, b.py1 + 5);
    ctx.strokeStyle = 'rgba(120, 110, 100, 0.4)';
    ctx.beginPath(); ctx.moveTo(tx, b.py1); ctx.lineTo(tx, b.py1 + 4); ctx.stroke();
  }
}

function pSL(b) {
  if (scanX === null) return;
  const sx = b.px0 + Math.min(Math.max(scanX, 0), 1) * b.pw;
  if (sx >= b.px0 && sx <= b.px1) {
    ctx.strokeStyle = 'rgba(204, 51, 68, 0.4)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(sx, b.py0); ctx.lineTo(sx, b.py1); ctx.stroke();
  }
}

// ─── PANEL 1: f(x) ───
function drawPdfInset() {
  const ix = pox(0);
  drawPanelBg(ix, 'rgba(158, 27, 50, 0.2)');
  const b2 = bnd(ix);

  // Compute peak for y scaling
  let peakPdf = 0;
  for (let i = 0; i <= 400; i++) {
    const xv = i / 400;
    peakPdf = Math.max(peakPdf, betaPdf(xv));
  }
  // Clamp peak for U-shaped densities that blow up at endpoints
  if (!isFinite(peakPdf) || peakPdf > 50) peakPdf = 50;
  const yMax = peakPdf * 1.15;

  ctx.fillStyle = 'rgba(60, 55, 48, 0.7)';
  ctx.font = '500 20px "IBM Plex Mono", monospace';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText('f(x)', ix + PANEL.ip.left, PANEL.iy + 12);

  drawPA(b2); drawPXT01(b2);

  // Peak label
  const peakY = b2.py0 + (1 - peakPdf / yMax) * b2.ph;
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(90, 80, 70, 0.5)';
  ctx.font = '400 12px "IBM Plex Mono", monospace';
  ctx.fillText(peakPdf.toFixed(2), b2.px0 - 5, peakY);
  ctx.setLineDash([5, 5]);
  ctx.strokeStyle = 'rgba(158, 27, 50, 0.15)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(b2.px0, peakY); ctx.lineTo(b2.px1, peakY); ctx.stroke();
  ctx.setLineDash([]);

  // Shaded area up to scan
  if (scanX !== null && scanX > 0) {
    const clipX = Math.min(Math.max(scanX, 0), 1);
    ctx.beginPath();
    for (let i = 0; i <= 200; i++) {
      const xv = (i / 200) * clipX;
      let yv = betaPdf(xv);
      if (!isFinite(yv)) yv = yMax;
      yv = Math.min(yv, yMax);
      const sx = b2.px0 + xv * b2.pw;
      const sy = b2.py0 + (1 - yv / yMax) * b2.ph;
      i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
    }
    ctx.lineTo(b2.px0 + clipX * b2.pw, b2.py1);
    ctx.lineTo(b2.px0, b2.py1);
    ctx.closePath();
    ctx.fillStyle = 'rgba(204, 51, 68, 0.12)';
    ctx.fill();
  }

  // Full curve
  ctx.beginPath();
  for (let i = 0; i <= 500; i++) {
    const xv = i / 500;
    let yv = betaPdf(xv);
    if (!isFinite(yv)) yv = yMax;
    yv = Math.min(yv, yMax);
    const sx = b2.px0 + xv * b2.pw;
    const sy = b2.py0 + (1 - yv / yMax) * b2.ph;
    i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
  }
  ctx.strokeStyle = 'rgba(158, 27, 50, 0.85)'; ctx.lineWidth = 2.5;
  ctx.stroke();

  ctx.lineTo(b2.px1, b2.py1); ctx.lineTo(b2.px0, b2.py1); ctx.closePath();
  ctx.fillStyle = 'rgba(158, 27, 50, 0.05)'; ctx.fill();

  pSL(b2);
}

// ─── PANEL 2: F(x) — Pachyderm ───
function drawCdfInset() {
  const ix = pox(1);
  drawPanelBg(ix, 'rgba(95, 106, 114, 0.2)');
  const b2 = bnd(ix);
  const yMax = 1.08;

  ctx.fillStyle = 'rgba(60, 55, 48, 0.7)';
  ctx.font = '500 20px "IBM Plex Mono", monospace';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText('F(x)', ix + PANEL.ip.left, PANEL.iy + 12);

  drawPA(b2); drawPXT01(b2);

  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(90, 80, 70, 0.6)';
  for (const yt of [0.5, 1.0]) {
    const yy = b2.py0 + (1 - yt / yMax) * b2.ph;
    ctx.fillText(yt.toFixed(1), b2.px0 - 5, yy);
    ctx.setLineDash([4, 5]);
    ctx.strokeStyle = 'rgba(95, 106, 114, 0.18)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(b2.px0, yy); ctx.lineTo(b2.px1, yy); ctx.stroke();
    ctx.setLineDash([]);
  }

  ctx.beginPath();
  for (let i = 0; i <= 400; i++) {
    const xv = i / 400;
    const Fv = betaCdfFinal(xv);
    const sx = b2.px0 + xv * b2.pw;
    const sy = b2.py0 + (1 - Fv / yMax) * b2.ph;
    i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
  }
  ctx.strokeStyle = 'rgba(95, 106, 114, 0.85)'; ctx.lineWidth = 2.5;
  ctx.stroke();

  pSL(b2);

  if (scanX !== null && scanX >= 0) {
    const xc = Math.min(Math.max(scanX, 0), 1);
    const Fs = betaCdfFinal(xc);
    const dx = b2.px0 + xc * b2.pw;
    const dy = b2.py0 + (1 - Fs / yMax) * b2.ph;
    ctx.beginPath(); ctx.arc(dx, dy, 5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(204, 51, 68, 0.9)'; ctx.fill();

    ctx.fillStyle = 'rgba(95, 106, 114, 0.85)';
    ctx.font = '600 16px "IBM Plex Mono", monospace';
    ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
    ctx.fillText(`F = ${Fs.toFixed(3)}`, b2.px0 + b2.pw * 0.55, b2.py0 + 16);
  }
}

// ─── PANEL 3: F̂(x) — navy ECDF ───
function drawEcdfInset() {
  const ix = pox(2);
  drawPanelBg(ix, 'rgba(30, 80, 160, 0.18)');
  const b2 = bnd(ix);
  const yMax = 1.08;

  ctx.fillStyle = 'rgba(60, 55, 48, 0.7)';
  ctx.font = '500 20px "IBM Plex Mono", monospace';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText('F̂(x)', ix + PANEL.ip.left, PANEL.iy + 12);

  drawPA(b2); drawPXT01(b2);

  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(90, 80, 70, 0.6)';
  for (const yt of [0.5, 1.0]) {
    const yy = b2.py0 + (1 - yt / yMax) * b2.ph;
    ctx.fillText(yt.toFixed(1), b2.px0 - 5, yy);
    ctx.setLineDash([4, 5]);
    ctx.strokeStyle = 'rgba(30, 80, 160, 0.12)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(b2.px0, yy); ctx.lineTo(b2.px1, yy); ctx.stroke();
    ctx.setLineDash([]);
  }

  // Faint theoretical CDF (Pachyderm)
  ctx.beginPath();
  for (let i = 0; i <= 200; i++) {
    const xv = i / 200;
    const Fv = betaCdfFinal(xv);
    const sx = b2.px0 + xv * b2.pw;
    const sy = b2.py0 + (1 - Fv / yMax) * b2.ph;
    i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
  }
  ctx.strokeStyle = 'rgba(95, 106, 114, 0.2)'; ctx.lineWidth = 1.5;
  ctx.stroke();

  if (scanX === null) return;

  const n = sortedX.length;
  const drawUpTo = Math.min(Math.max(scanX, 0), 1);

  let countBelow = 0;
  for (let i = 0; i < n; i++) {
    if (sortedX[i] <= drawUpTo) countBelow = i + 1; else break;
  }

  ctx.beginPath();
  let prevPy = b2.py0 + b2.ph;
  ctx.moveTo(b2.px0, prevPy);

  const maxSteps = 600;
  const stepSize = Math.max(1, Math.floor(countBelow / maxSteps));

  for (let i = 0; i < countBelow; i += stepSize) {
    const xv = sortedX[i];
    const Fhat = (i + 1) / n;
    const sx = b2.px0 + xv * b2.pw;
    const sy = b2.py0 + (1 - Fhat / yMax) * b2.ph;
    ctx.lineTo(sx, prevPy);
    ctx.lineTo(sx, sy);
    prevPy = sy;
  }

  const endPx = b2.px0 + drawUpTo * b2.pw;
  ctx.lineTo(endPx, prevPy);
  ctx.strokeStyle = 'rgba(30, 80, 160, 0.85)'; ctx.lineWidth = 2;
  ctx.stroke();

  const Fhat = countBelow / n;
  ctx.beginPath(); ctx.arc(endPx, prevPy, 5.5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(204, 51, 68, 0.9)'; ctx.fill();

  pSL(b2);

  ctx.fillStyle = 'rgba(204, 51, 68, 0.9)';
  ctx.font = '600 16px "IBM Plex Mono", monospace';
  ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
  ctx.fillText(`F̂ = ${Fhat.toFixed(3)}`, b2.px0 + b2.pw * 0.55, b2.py0 + 16);
}

// ─── Full render ───
function fullDraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawAxis();
  drawCloudWithScan();
  drawScanLine();
  drawPdfInset();
  drawCdfInset();
  drawEcdfInset();
}

// ─── Scan ───
function startScan() {
  if (scanAnim) cancelAnimationFrame(scanAnim);
  const speed = parseInt(document.getElementById('speedSlider').value);
  const totalFrames = Math.round(400 / speed);
  let frame = 0;
  const s0 = -0.05, s1 = 1.05;

  function step() {
    scanX = s0 + (s1 - s0) * (frame / totalFrames);
    fullDraw();
    frame++;
    if (frame <= totalFrames) scanAnim = requestAnimationFrame(step);
    else { scanX = s1; fullDraw(); }
  }
  step();
}

// ─── Controls ───
function updateLabels() {
  const av = parseFloat(document.getElementById('aSlider').value);
  const bv = parseFloat(document.getElementById('bSlider').value);
  const ns = parseInt(document.getElementById('nSlider').value);
  document.getElementById('aVal').textContent = av.toFixed(1);
  document.getElementById('bVal').textContent = bv.toFixed(1);
  document.getElementById('nVal').textContent = ns >= 1000 ? (ns / 1000).toFixed(0) + 'k' : ns;
  document.getElementById('aLabel').textContent = av.toFixed(2);
  document.getElementById('bLabel').textContent = bv.toFixed(2);
  const mean = av / (av + bv);
  const variance = (av * bv) / ((av + bv) * (av + bv) * (av + bv + 1));
  document.getElementById('meanLabel').textContent = mean.toFixed(3);
  document.getElementById('varLabel').textContent = variance.toFixed(4);
}

document.getElementById('aSlider').addEventListener('input', updateLabels);
document.getElementById('bSlider').addEventListener('input', updateLabels);
document.getElementById('nSlider').addEventListener('input', updateLabels);

document.getElementById('redrawBtn').addEventListener('click', () => {
  if (scanAnim) cancelAnimationFrame(scanAnim);
  scanX = null;
  a = parseFloat(document.getElementById('aSlider').value);
  b = parseFloat(document.getElementById('bSlider').value);
  N = parseInt(document.getElementById('nSlider').value);
  generateParticles();
  fullDraw();
});

document.getElementById('scanBtn').addEventListener('click', startScan);

// Tooltip
const wrap = document.querySelector('.canvas-wrap');
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const mx = (e.clientX - rect.left) * scaleX;
  const plotW = canvas.width - PAD.left - PAD.right;
  const xVal = (mx - PAD.left) / plotW;
  if (xVal >= 0 && xVal <= 1) {
    const f = betaPdf(xVal);
    const F = betaCdfFinal(xVal);
    tooltip.textContent = `x = ${xVal.toFixed(4)}   f(x) = ${(isFinite(f) ? f : '∞')}   F(x) = ${F.toFixed(4)}`;
    tooltip.style.left = (e.clientX - wrap.getBoundingClientRect().left + 12) + 'px';
    tooltip.style.top = (e.clientY - wrap.getBoundingClientRect().top - 30) + 'px';
    tooltip.style.opacity = 1;
  } else { tooltip.style.opacity = 0; }
});
canvas.addEventListener('mouseleave', () => { tooltip.style.opacity = 0; });

// Formulas
katex.render(
  String.raw`f(x) = \frac{x^{\alpha-1}(1-x)^{\beta-1}}{B(\alpha,\beta)},\; 0<x<1`,
  document.getElementById('formulaPdf'),
  { throwOnError: false }
);
katex.render(
  String.raw`F(x) = I_x(\alpha,\beta)`,
  document.getElementById('formulaCdf'),
  { throwOnError: false }
);
katex.render(
  String.raw`\hat{F}_n(x) = \frac{1}{n}\sum_{i=1}^{n}\mathbf{1}(X_i \leq x)`,
  document.getElementById('formulaEcdf'),
  { throwOnError: false }
);

// Init
generateParticles();
fullDraw();
</script>
