<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMF Mass Visualization — Three-Point (Chebyshev-tight)</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;500&display=swap');

  :root {
    --bg: #ffffff;
    --surface: #f7f7f7;
    --text: #2c2a26;
    --text-dim: #6b6560;
    --accent: #9E1B32;
    --accent-glow: rgba(158, 27, 50, 0.15);
    --axis: #a09888;
    --scan: #cc3344;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }

  .container { width: 100%; max-width: 960px; }

  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .header h1 {
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 300;
    font-size: 1.25rem;
    letter-spacing: 0.02em;
  }

  .stats {
    display: flex;
    gap: 1.6rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    flex-wrap: wrap;
  }

  .stat-group label {
    color: var(--text-dim);
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 0.2rem;
  }

  .stat-group span {
    font-weight: 600;
    color: var(--text);
    font-size: 0.95rem;
  }

  .stat-group span.match { color: var(--accent); }

  .formula-bar {
    display: flex;
    align-items: center;
    gap: 1.2rem;
    margin-bottom: 1.25rem;
    padding: 0.75rem 1.25rem;
    background: rgba(158, 27, 50, 0.06);
    border: 1px solid rgba(158, 27, 50, 0.15);
    border-radius: 6px;
    flex-wrap: wrap;
  }

  .formula-bar .katex { font-size: 0.92rem; color: var(--text); }

  .canvas-wrap {
    position: relative;
    background: var(--surface);
    border-radius: 8px;
    padding: 2rem 2.5rem 3rem;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.04);
  }

  canvas { display: block; width: 100%; height: auto; cursor: crosshair; }

  .controls {
    margin-top: 1.5rem;
    display: flex;
    gap: 1.2rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .control-group {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .control-group label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 130px;
    height: 4px;
    background: var(--axis);
    border-radius: 2px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 8px var(--accent-glow);
  }

  input[type="number"] {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    font-weight: 600;
    width: 68px;
    padding: 0.32rem 0.5rem;
    background: #fff;
    border: 1px solid var(--axis);
    border-radius: 4px;
    color: var(--accent);
    outline: none;
  }
  input[type="number"]:focus { border-color: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }

  .value-display {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--accent);
    min-width: 3ch;
    text-align: right;
  }

  .btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.5rem 1.2rem;
    background: transparent;
    border: 1px solid var(--axis);
    color: var(--text-dim);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 12px var(--accent-glow);
  }

  .btn-scan {
    border-color: var(--scan);
    color: var(--scan);
  }

  .btn-scan:hover {
    box-shadow: 0 0 12px rgba(204, 51, 68, 0.2);
  }

  .tooltip {
    position: absolute;
    pointer-events: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    background: rgba(255, 255, 255, 0.96);
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid var(--axis);
    opacity: 0;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>PMF Mass Visualization</h1>
    <div class="stats">
      <div class="stat-group">
        <label>Distribution</label>
        <span>Three-Point</span>
      </div>
      <div class="stat-group">
        <label>k</label>
        <span id="kLabel">2.00</span>
      </div>
      <div class="stat-group">
        <label>E[X]</label>
        <span>0</span>
      </div>
      <div class="stat-group">
        <label>Var</label>
        <span>1</span>
      </div>
      <div class="stat-group">
        <label>P(|X−μ|≥kσ)</label>
        <span class="match" id="tailLabel">0.250</span>
      </div>
      <div class="stat-group">
        <label>Bound 1/k²</label>
        <span class="match" id="boundLabel">0.250</span>
      </div>
    </div>
  </div>

  <div class="formula-bar">
    <span id="formulaMain"></span>
    <span style="margin-left: 1rem;" id="formulaCheb"></span>
    <span style="margin-left: 1rem;" id="formulaMoments"></span>
  </div>

  <div class="canvas-wrap">
    <canvas id="plot" width="1800" height="950"></canvas>
    <div class="tooltip" id="tooltip"></div>
  </div>

  <div class="controls">
    <div class="control-group">
      <label>k</label>
      <input type="range" id="kSlider" min="1.1" max="6" step="0.05" value="2">
      <input type="number" id="kInput" min="1.1" max="6" step="0.05" value="2.00">
    </div>
    <button class="btn btn-scan" id="sweepBtn">▶ Sweep k</button>
    <div class="control-group">
      <label>Speed</label>
      <input type="range" id="speedSlider" min="1" max="10" step="1" value="4">
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('plot');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');

// ─── The tight three-point distribution ───
// mean mu = 0, sigma = 1, fixed k:
//   P(X = -k) = 1/(2k^2)
//   P(X =  0) = 1 - 1/k^2
//   P(X = +k) = 1/(2k^2)
// gives  P(|X - mu| >= k*sigma) = 1/k^2  (exactly the Chebyshev bound)
let k = 2;
const mu = 0, sigma = 1;
let sweepAnim = null;

const K_MIN = 1.1, K_MAX = 6;

function tailMass() { return 1 / (k * k); }        // each tail = half of this
function centerMass() { return 1 - 1 / (k * k); }
function points() {
  const t = 1 / (2 * k * k);
  return [
    { x: -k, p: t,            label: '−k' },
    { x: 0,  p: centerMass(), label: 'μ'  },
    { x: k,  p: t,            label: '+k' }
  ];
}
function cdfAt(idx) { // cumulative through point idx (0,1,2)
  const t = 1 / (2 * k * k);
  if (idx === 0) return t;
  if (idx === 1) return t + centerMass();
  return 1;
}

// ─── Layout ───
const PAD = { left: 80, right: 60, top: 360, bottom: 120 };

function xHalf() { return 1.35 * k + 0.6; }      // symmetric x-range half-width
function xLo() { return -xHalf(); }
function xHi() { return xHalf(); }

function canvasX(x) {
  return PAD.left + ((x - xLo()) / (xHi() - xLo())) * (canvas.width - PAD.left - PAD.right);
}
function canvasMidY() {
  const axisY = canvas.height - PAD.bottom;
  return (PAD.top + axisY) / 2;
}

// ════════════════════════════════════════
// MAIN PLOT
// ════════════════════════════════════════
function drawMain() {
  const axisY = canvas.height - PAD.bottom;
  const topY = PAD.top;
  const pts = points();

  // ── Tail shading: |x| >= k ──
  const xkL = canvasX(-k), xkR = canvasX(k);
  ctx.fillStyle = 'rgba(158, 27, 50, 0.06)';
  ctx.fillRect(canvasX(xLo()), topY, xkL - canvasX(xLo()), axisY - topY);
  ctx.fillRect(xkR, topY, canvasX(xHi()) - xkR, axisY - topY);

  // ── Vertical guides at the three points ──
  ctx.setLineDash([4, 8]);
  ctx.strokeStyle = 'rgba(120, 110, 100, 0.12)';
  ctx.lineWidth = 1;
  for (const pt of pts) {
    const tx = canvasX(pt.x);
    ctx.beginPath(); ctx.moveTo(tx, topY + 10); ctx.lineTo(tx, axisY); ctx.stroke();
  }
  ctx.setLineDash([]);

  // ── ±kσ band edges ──
  for (const sx of [xkL, xkR]) {
    ctx.setLineDash([6, 4]);
    ctx.strokeStyle = 'rgba(158, 27, 50, 0.35)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(sx, topY); ctx.lineTo(sx, axisY); ctx.stroke();
    ctx.setLineDash([]);
  }
  ctx.fillStyle = 'rgba(158, 27, 50, 0.7)';
  ctx.font = '600 17px "IBM Plex Mono", monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.fillText('−kσ', xkL, topY - 4);
  ctx.fillText('+kσ', xkR, topY - 4);

  // ── Mean marker ──
  const mx = canvasX(mu);
  ctx.setLineDash([6, 4]);
  ctx.strokeStyle = 'rgba(158, 27, 50, 0.2)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(mx, topY); ctx.lineTo(mx, axisY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#8a8078'; ctx.font = '400 15px "IBM Plex Mono", monospace';
  ctx.fillText('μ = 0', mx, topY - 4);

  // ── Headline equality ──
  const tail = tailMass();
  ctx.fillStyle = 'rgba(158, 27, 50, 0.92)';
  ctx.font = '600 26px "IBM Plex Mono", monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(`P(|X − μ| ≥ kσ)  =  1/k²  =  ${tail.toFixed(3)}`, canvas.width / 2, topY - 34);
  ctx.fillStyle = 'rgba(107, 101, 96, 0.85)';
  ctx.font = '400 16px "IBM Plex Sans", sans-serif';
  ctx.fillText('Chebyshev bound attained with equality — the tail mass sits exactly on the boundary', canvas.width / 2, topY - 8);

  // ── Mass blobs (area ∝ probability) ──
  const midY = canvasMidY();
  const rMax = 72;
  for (const pt of pts) {
    const cx = canvasX(pt.x);
    const r = Math.max(5, rMax * Math.sqrt(pt.p));
    const g = ctx.createRadialGradient(cx, midY, 0, cx, midY, r);
    g.addColorStop(0,    'rgba(130, 20, 42, 0.9)');
    g.addColorStop(0.45, 'rgba(158, 27, 50, 0.5)');
    g.addColorStop(1,    'rgba(158, 27, 50, 0.04)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(cx, midY, r, 0, Math.PI * 2); ctx.fill();
    // crisp core
    ctx.beginPath(); ctx.arc(cx, midY, Math.max(3, r * 0.16), 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(130, 20, 42, 0.95)'; ctx.fill();

    // probability above blob
    ctx.fillStyle = 'rgba(158, 27, 50, 0.9)';
    ctx.font = '600 20px "IBM Plex Mono", monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText(pt.p.toFixed(3), cx, midY - r - 8);
  }

  // ── Axis ──
  ctx.strokeStyle = '#a09888'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(canvasX(xLo()), axisY); ctx.lineTo(canvasX(xHi()), axisY); ctx.stroke();

  // ── Below-axis rows: x value, p(x), F(x) ──
  const cumLabels = [cdfAt(0), cdfAt(1), cdfAt(2)];
  const symP = ['1/(2k²)', '1 − 1/k²', '1/(2k²)'];
  for (let i = 0; i < pts.length; i++) {
    const pt = pts[i];
    const tx = canvasX(pt.x);
    ctx.strokeStyle = '#a09888'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(tx, axisY); ctx.lineTo(tx, axisY + 8); ctx.stroke();

    // x value
    ctx.fillStyle = '#5a5248';
    ctx.font = '600 20px "IBM Plex Mono", monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText(pt.x.toFixed(2), tx, axisY + 14);

    // symbolic p
    ctx.fillStyle = '#2c2a26';
    ctx.font = '500 17px "IBM Plex Mono", monospace';
    ctx.fillText(symP[i], tx, axisY + 42);

    // F(x)
    ctx.fillStyle = '#2c2a26';
    ctx.font = '600 19px "IBM Plex Mono", monospace';
    ctx.fillText(cumLabels[i].toFixed(3), tx, axisY + 68);
  }
  // row labels
  ctx.textAlign = 'right';
  ctx.fillStyle = '#2c2a26';
  ctx.font = '500 17px "IBM Plex Mono", monospace';
  ctx.fillText('p(x)', canvasX(xLo()) + 4, axisY + 43);
  ctx.fillText('F(x)', canvasX(xLo()) + 4, axisY + 69);
}

// ════════════════════════════════════════
// PANELS
// ════════════════════════════════════════
const PANEL = {
  gap: 16, ih: 280, iy: 16,
  ip: { left: 52, right: 16, top: 44, bottom: 44 },
  get panelW() { return (canvas.width - 40 - this.gap * 2) / 3; }
};

function panelX(idx) { return 20 + idx * (PANEL.panelW + PANEL.gap); }
function panelPlotBounds(ix) {
  const px0 = ix + PANEL.ip.left;
  const px1 = ix + PANEL.panelW - PANEL.ip.right;
  const py0 = PANEL.iy + PANEL.ip.top;
  const py1 = PANEL.iy + PANEL.ih - PANEL.ip.bottom;
  return { px0, px1, py0, py1, pw: px1 - px0, ph: py1 - py0 };
}
// map a value-domain x into a panel (symmetric ±xHalf)
function panelValX(b, x) {
  return b.px0 + ((x - xLo()) / (xHi() - xLo())) * b.pw;
}
// map a k-domain value into the bound panel
function panelKX(b, kk) {
  return b.px0 + ((kk - 1) / (K_MAX - 1)) * b.pw;
}

function drawPanelBg(ix, borderColor) {
  ctx.save();
  ctx.globalAlpha = 0.92;
  ctx.fillStyle = '#f0f0f0';
  ctx.beginPath(); ctx.roundRect(ix, PANEL.iy, PANEL.panelW, PANEL.ih, 8); ctx.fill();
  ctx.restore();
  ctx.strokeStyle = borderColor; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(ix, PANEL.iy, PANEL.panelW, PANEL.ih, 8); ctx.stroke();
}
function drawPanelAxes(b) {
  ctx.strokeStyle = 'rgba(120, 110, 100, 0.4)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(b.px0, b.py1); ctx.lineTo(b.px1, b.py1); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(b.px0, b.py0); ctx.lineTo(b.px0, b.py1); ctx.stroke();
}
function panelTitle(ix, txt) {
  ctx.fillStyle = 'rgba(60, 55, 48, 0.7)';
  ctx.font = '500 20px "IBM Plex Mono", monospace';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText(txt, ix + PANEL.ip.left, PANEL.iy + 10);
}
// x ticks at -k, 0, k for value-domain panels
function drawValueXTicks(b) {
  ctx.fillStyle = 'rgba(90, 80, 70, 0.6)';
  ctx.font = '400 13px "IBM Plex Mono", monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  for (const x of [-k, 0, k]) {
    const tx = panelValX(b, x);
    ctx.fillText(x.toFixed(1), tx, b.py1 + 5);
    ctx.strokeStyle = 'rgba(120, 110, 100, 0.4)';
    ctx.beginPath(); ctx.moveTo(tx, b.py1); ctx.lineTo(tx, b.py1 + 4); ctx.stroke();
  }
}

// ─── PANEL 1: PMF stems ───
function drawPmfInset() {
  const ix = panelX(0);
  drawPanelBg(ix, 'rgba(158, 27, 50, 0.2)');
  const b = panelPlotBounds(ix);
  panelTitle(ix, 'p(x)');
  drawPanelAxes(b);
  drawValueXTicks(b);

  const pts = points();
  const maxP = Math.max(...pts.map(p => p.p), 0.05);
  const yMax = maxP * 1.2;

  // peak gridline
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(90, 80, 70, 0.55)'; ctx.font = '400 12px "IBM Plex Mono", monospace';
  const peakY = b.py0 + (1 - maxP / yMax) * b.ph;
  ctx.fillText(maxP.toFixed(3), b.px0 - 5, peakY);
  ctx.setLineDash([5, 5]); ctx.strokeStyle = 'rgba(158, 27, 50, 0.12)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(b.px0, peakY); ctx.lineTo(b.px1, peakY); ctx.stroke();
  ctx.setLineDash([]);

  for (const pt of pts) {
    const sx = panelValX(b, pt.x);
    const sy = b.py0 + (1 - pt.p / yMax) * b.ph;
    ctx.strokeStyle = 'rgba(158, 27, 50, 0.7)'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(sx, b.py1); ctx.lineTo(sx, sy); ctx.stroke();
    ctx.beginPath(); ctx.arc(sx, sy, 5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(158, 27, 50, 0.85)'; ctx.fill();
  }
}

// ─── PANEL 2: theoretical CDF step (Pachyderm gray) ───
function drawCdfInset() {
  const ix = panelX(1);
  drawPanelBg(ix, 'rgba(95, 106, 114, 0.2)');
  const b = panelPlotBounds(ix);
  panelTitle(ix, 'F(x)');
  drawPanelAxes(b);
  drawValueXTicks(b);

  const yMax = 1.08;
  function pyF(f) { return b.py0 + (1 - f / yMax) * b.ph; }

  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(90, 80, 70, 0.6)'; ctx.font = '400 12px "IBM Plex Mono", monospace';
  for (const yt of [0.5, 1.0]) {
    const yy = pyF(yt);
    ctx.fillText(yt.toFixed(1), b.px0 - 6, yy);
    ctx.setLineDash([4, 5]); ctx.strokeStyle = 'rgba(95, 106, 114, 0.15)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(b.px0, yy); ctx.lineTo(b.px1, yy); ctx.stroke();
    ctx.setLineDash([]);
  }

  const xs = [-k, 0, k];
  const Fs = [cdfAt(0), cdfAt(1), cdfAt(2)];
  const dotR = 4.5;
  const gray = 'rgba(95, 106, 114, 0.8)';
  const grayDim = 'rgba(95, 106, 114, 0.3)';

  // F = 0 before first point
  let prevY = pyF(0);
  ctx.strokeStyle = gray; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(b.px0, prevY); ctx.lineTo(panelValX(b, xs[0]), prevY); ctx.stroke();
  ctx.beginPath(); ctx.arc(panelValX(b, xs[0]), prevY, dotR, 0, Math.PI * 2);
  ctx.strokeStyle = gray; ctx.lineWidth = 1.5; ctx.stroke();

  for (let i = 0; i < xs.length; i++) {
    const sx = panelValX(b, xs[i]);
    const sy = pyF(Fs[i]);
    // vertical jump
    ctx.setLineDash([3, 3]); ctx.strokeStyle = grayDim; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(sx, prevY); ctx.lineTo(sx, sy); ctx.stroke();
    ctx.setLineDash([]);
    // filled dot
    ctx.beginPath(); ctx.arc(sx, sy, dotR, 0, Math.PI * 2);
    ctx.fillStyle = gray; ctx.fill();
    // horizontal to next
    const nextX = (i < xs.length - 1) ? panelValX(b, xs[i + 1]) : b.px1;
    ctx.strokeStyle = gray; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(nextX, sy); ctx.stroke();
    // open circle at next jump
    if (i < xs.length - 1) {
      ctx.beginPath(); ctx.arc(nextX, sy, dotR, 0, Math.PI * 2);
      ctx.fillStyle = '#f0f0f0'; ctx.fill();
      ctx.strokeStyle = gray; ctx.lineWidth = 1.5; ctx.stroke();
    }
    prevY = sy;
  }
}

// ─── PANEL 3: the bound 1/k² with the operating point (blue) ───
function drawBoundInset() {
  const ix = panelX(2);
  drawPanelBg(ix, 'rgba(30, 80, 160, 0.18)');
  const b = panelPlotBounds(ix);
  panelTitle(ix, '1/k²');
  drawPanelAxes(b);

  const yMax = 1.05;
  function pyB(v) { return b.py0 + (1 - v / yMax) * b.ph; }

  // y ticks
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(90, 80, 70, 0.6)'; ctx.font = '400 12px "IBM Plex Mono", monospace';
  for (const yt of [0.5, 1.0]) {
    const yy = pyB(yt);
    ctx.fillText(yt.toFixed(1), b.px0 - 6, yy);
    ctx.setLineDash([4, 5]); ctx.strokeStyle = 'rgba(30, 80, 160, 0.12)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(b.px0, yy); ctx.lineTo(b.px1, yy); ctx.stroke();
    ctx.setLineDash([]);
  }
  // x ticks (k axis)
  ctx.fillStyle = 'rgba(90, 80, 70, 0.6)'; ctx.font = '400 13px "IBM Plex Mono", monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  for (let kk = 1; kk <= K_MAX; kk++) {
    const tx = panelKX(b, kk);
    ctx.fillText(kk, tx, b.py1 + 5);
    ctx.strokeStyle = 'rgba(120, 110, 100, 0.4)';
    ctx.beginPath(); ctx.moveTo(tx, b.py1); ctx.lineTo(tx, b.py1 + 4); ctx.stroke();
  }
  ctx.fillStyle = 'rgba(90, 80, 70, 0.5)'; ctx.font = '400 12px "IBM Plex Mono", monospace';
  ctx.textAlign = 'right'; ctx.textBaseline = 'bottom';
  ctx.fillText('k', b.px1, b.py1 + 22);

  // bound curve 1/k²
  ctx.strokeStyle = 'rgba(30, 80, 160, 0.85)'; ctx.lineWidth = 2.5;
  ctx.beginPath();
  let first = true;
  for (let kk = 1; kk <= K_MAX + 0.001; kk += 0.04) {
    const px = panelKX(b, kk), py = pyB(1 / (kk * kk));
    if (first) { ctx.moveTo(px, py); first = false; } else ctx.lineTo(px, py);
  }
  ctx.stroke();

  // operating point: (k, 1/k²) — actual tail rides exactly on the curve
  const opX = panelKX(b, k), opY = pyB(1 / (k * k));
  ctx.setLineDash([3, 4]); ctx.strokeStyle = 'rgba(204, 51, 68, 0.5)'; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.moveTo(opX, b.py1); ctx.lineTo(opX, opY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(b.px0, opY); ctx.lineTo(opX, opY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath(); ctx.arc(opX, opY, 5.5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(204, 51, 68, 0.9)'; ctx.fill();

  // readout
  ctx.fillStyle = 'rgba(204, 51, 68, 0.9)';
  ctx.font = '600 15px "IBM Plex Mono", monospace';
  ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
  ctx.fillText(`tail = bound = ${(1 / (k * k)).toFixed(3)}`, b.px0 + b.pw * 0.30, b.py0 + 18);
}

// ─── Full render ───
function fullDraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawMain();
  drawPmfInset();
  drawCdfInset();
  drawBoundInset();
}

// ─── Stats / labels ───
function updateLabels() {
  document.getElementById('kLabel').textContent = k.toFixed(2);
  const v = (1 / (k * k)).toFixed(3);
  document.getElementById('tailLabel').textContent = v;
  document.getElementById('boundLabel').textContent = v;
}

// ─── k controls ───
const kSlider = document.getElementById('kSlider');
const kInput = document.getElementById('kInput');

function setK(newK, fromInput) {
  k = Math.min(K_MAX, Math.max(K_MIN, newK));
  if (!fromInput) kInput.value = k.toFixed(2);
  kSlider.value = k;
  updateLabels();
  fullDraw();
}

kSlider.addEventListener('input', () => {
  if (sweepAnim) { cancelAnimationFrame(sweepAnim); sweepAnim = null; }
  setK(parseFloat(kSlider.value), false);
});
kInput.addEventListener('input', () => {
  if (sweepAnim) { cancelAnimationFrame(sweepAnim); sweepAnim = null; }
  const val = parseFloat(kInput.value);
  if (!isNaN(val)) setK(val, true);
});
kInput.addEventListener('blur', () => { kInput.value = k.toFixed(2); });

// ─── Sweep k animation (parallels "Scan CDF") ───
document.getElementById('sweepBtn').addEventListener('click', () => {
  if (sweepAnim) cancelAnimationFrame(sweepAnim);
  const speed = parseInt(document.getElementById('speedSlider').value);
  const totalFrames = Math.round(360 / speed);
  let frame = 0;
  function step() {
    const t = frame / totalFrames;
    setK(K_MIN + (K_MAX - K_MIN) * t, false);
    frame++;
    if (frame <= totalFrames) sweepAnim = requestAnimationFrame(step);
    else { setK(K_MAX, false); sweepAnim = null; }
  }
  step();
});

// ─── Tooltip ───
const wrap = document.querySelector('.canvas-wrap');
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const mx = (e.clientX - rect.left) * scaleX;
  const plotW = canvas.width - PAD.left - PAD.right;
  const xVal = xLo() + ((mx - PAD.left) / plotW) * (xHi() - xLo());
  const pts = points();
  let hit = null;
  for (const pt of pts) if (Math.abs(xVal - pt.x) < (xHi() - xLo()) * 0.025) hit = pt;
  if (hit) {
    const where = hit.x === 0 ? 'inside band' : 'tail (|X|≥kσ)';
    tooltip.textContent = `X = ${hit.x.toFixed(2)}   p = ${hit.p.toFixed(4)}   ${where}`;
    tooltip.style.left = (e.clientX - wrap.getBoundingClientRect().left + 12) + 'px';
    tooltip.style.top = (e.clientY - wrap.getBoundingClientRect().top - 30) + 'px';
    tooltip.style.opacity = 1;
  } else { tooltip.style.opacity = 0; }
});
canvas.addEventListener('mouseleave', () => { tooltip.style.opacity = 0; });

// ─── Formulas ───
katex.render(
  String.raw`p(\pm k)=\tfrac{1}{2k^{2}},\quad p(0)=1-\tfrac{1}{k^{2}}`,
  document.getElementById('formulaMain'), { throwOnError: false }
);
katex.render(
  String.raw`P(|X-\mu|\ge k\sigma)\;\le\;\frac{1}{k^{2}}`,
  document.getElementById('formulaCheb'), { throwOnError: false }
);
katex.render(
  String.raw`\mu=0,\ \ \sigma^{2}=1`,
  document.getElementById('formulaMoments'), { throwOnError: false }
);

// ─── Init ───
updateLabels();
fullDraw();
</script>
</body>
</html>
