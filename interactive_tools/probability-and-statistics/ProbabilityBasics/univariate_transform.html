<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Transformation Visualization</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;500;600&display=swap');

  :root {
    --bg: #ffffff;
    --surface: #f7f7f7;
    --text: #2c2a26;
    --text-dim: #6b6560;
    --accent: #9E1B32;
    --accent-glow: rgba(158, 27, 50, 0.15);
    --pachy: #5F6A72;
    --axis: #a09888;
    --scan: #cc3344;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 0.6rem 1.5rem;
  }

  .container { width: 100%; max-width: 960px; }

  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 0.5rem;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .header h1 {
    font-weight: 300;
    font-size: 1.1rem;
    letter-spacing: 0.02em;
  }

  .formula-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 1rem;
    margin-bottom: 0.5rem;
    padding: 0.4rem 0.8rem;
    background: rgba(158, 27, 50, 0.05);
    border: 1px solid rgba(158, 27, 50, 0.12);
    border-radius: 6px;
    flex-wrap: wrap;
  }

  .formula-bar .katex { font-size: 0.82rem; color: var(--text); }

  .stats-board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.5rem;
    background: var(--surface);
    border: 1px solid rgba(0, 0, 0, 0.06);
    padding: 0.4rem 1rem;
    border-radius: 6px;
    margin-bottom: 0.5rem;
  }

  .stat-card { display: flex; flex-direction: column; gap: 0.1rem; }

  .stat-card label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .stat-card span {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--accent);
  }

  .stat-card.theoretical span { color: var(--pachy); }

  .canvas-wrap {
    background: var(--surface);
    border-radius: 8px;
    padding: 0.8rem 1.5rem;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.04);
    position: relative;
  }

  canvas { display: block; width: 100%; height: auto; }

  .controls {
    margin-top: 0.5rem;
    display: flex;
    justify-content: center;
    gap: 2rem;
    align-items: center;
    background: var(--surface);
    padding: 0.5rem 1rem;
    border-radius: 6px;
    border: 1px solid rgba(0,0,0,0.04);
  }

  .control-group {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .control-group label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 120px;
    height: 4px;
    background: var(--axis);
    border-radius: 2px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 8px var(--accent-glow);
  }

  .value-display {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--accent);
    min-width: 3.5ch;
    text-align: right;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Transforming Probability Mass</h1>
  </div>

  <div class="formula-bar">
    <span id="formulaY"></span>
    <span id="formulaTransform"></span>
    <span id="formulaDeriv"></span>
  </div>

  <div class="stats-board">
    <div class="stat-card">
      <label>Window Δu</label>
      <span id="valDu">0.200</span>
    </div>
    <div class="stat-card">
      <label>Preimage Δy</label>
      <span id="valDy">0.000</span>
    </div>
    <div class="stat-card">
      <label>Geom Ratio (Δy/Δu)</label>
      <span id="valRatio">0.000</span>
    </div>
    <div class="stat-card theoretical">
      <label>|dy/du| at corner</label>
      <span id="valDeriv">0.000</span>
    </div>
  </div>

  <div class="canvas-wrap">
    <canvas id="plot" width="1000" height="440"></canvas>
  </div>

  <div class="controls">
    <div class="control-group">
      <label>Center (u)</label>
      <input type="range" id="uSlider" min="0.05" max="1.95" step="0.01" value="0.5">
      <span class="value-display" id="uVal">0.50</span>
    </div>
    <div class="control-group">
      <label>Width (Δu)</label>
      <input type="range" id="duSlider" min="0.02" max="0.4" step="0.01" value="0.1">
      <span class="value-display" id="duVal">0.10</span>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('plot');
const ctx = canvas.getContext('2d');

const N = 4000;
let particles = [];
let uCenter = 0.5;
let deltaU = 0.1;

const PAD_X = 60;
const Y_AXIS_Y = 110;
const U_AXIS_Y = 330;
const W = canvas.width - PAD_X * 2;

const Y_MIN = -0.1, Y_MAX = 1.2;
const U_MIN = -0.2, U_MAX = 2.4;

function mapY(y) { return PAD_X + ((y - Y_MIN) / (Y_MAX - Y_MIN)) * W; }
function mapU(u) { return PAD_X + ((u - U_MIN) / (U_MAX - U_MIN)) * W; }

function randNorm(mu, sigma) {
  let u = 0, v = 0;
  while (u === 0) u = Math.random();
  while (v === 0) v = Math.random();
  return (Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v)) * sigma + mu;
}

function generateParticles() {
  particles = [];
  for (let i = 0; i < N; i++) {
    let y = Math.sqrt(Math.random());
    let u = 2 * Math.pow(y, 3);
    let verticalOffset = randNorm(0, 0.04);
    particles.push({ y, u, verticalOffset });
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const uMin = Math.max(0, uCenter - deltaU / 2);
  const uMax = Math.min(2, uCenter + deltaU / 2);
  const actualDeltaU = uMax - uMin;

  const yMin = Math.pow(uMin / 2, 1 / 3);
  const yMax = Math.pow(uMax / 2, 1 / 3);
  const deltaYv = yMax - yMin;

  // Mapping polygon (crimson, faint)
  ctx.fillStyle = 'rgba(158, 27, 50, 0.06)';
  ctx.beginPath();
  ctx.moveTo(mapY(yMin), Y_AXIS_Y);
  ctx.lineTo(mapY(yMax), Y_AXIS_Y);
  ctx.lineTo(mapU(uMax), U_AXIS_Y);
  ctx.lineTo(mapU(uMin), U_AXIS_Y);
  ctx.closePath();
  ctx.fill();

  // Projection dashed lines
  ctx.setLineDash([5, 5]);
  ctx.strokeStyle = 'rgba(158, 27, 50, 0.25)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(mapY(yMin), Y_AXIS_Y); ctx.lineTo(mapU(uMin), U_AXIS_Y);
  ctx.moveTo(mapY(yMax), Y_AXIS_Y); ctx.lineTo(mapU(uMax), U_AXIS_Y);
  ctx.stroke();
  ctx.setLineDash([]);

  // Axes
  drawAxis(Y_AXIS_Y, Y_MIN, Y_MAX, 'y', 0.2);
  drawAxis(U_AXIS_Y, U_MIN, U_MAX, 'u', 0.4);

  // Highlight boxes (crimson)
  ctx.fillStyle = 'rgba(158, 27, 50, 0.12)';
  ctx.strokeStyle = 'rgba(158, 27, 50, 0.7)';
  ctx.lineWidth = 2;
  ctx.fillRect(mapY(yMin), Y_AXIS_Y - 30, mapY(yMax) - mapY(yMin), 60);
  ctx.strokeRect(mapY(yMin), Y_AXIS_Y - 30, mapY(yMax) - mapY(yMin), 60);
  ctx.fillRect(mapU(uMin), U_AXIS_Y - 30, mapU(uMax) - mapU(uMin), 60);
  ctx.strokeRect(mapU(uMin), U_AXIS_Y - 30, mapU(uMax) - mapU(uMin), 60);

  // Bracket labels
  ctx.fillStyle = 'rgba(158, 27, 50, 0.85)';
  ctx.font = '600 14px "IBM Plex Mono", monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  const yMid = (mapY(yMin) + mapY(yMax)) / 2;
  ctx.fillText(`Δy = ${deltaYv.toFixed(3)}`, yMid, Y_AXIS_Y - 36);
  const uMid = (mapU(uMin) + mapU(uMax)) / 2;
  ctx.fillText(`Δu = ${actualDeltaU.toFixed(3)}`, uMid, U_AXIS_Y - 36);

  // Particles
  for (const p of particles) {
    const isInside = (p.u >= uMin && p.u <= uMax);

    const fillDim = 'rgba(95, 106, 114, 0.10)';
    const fillIn = 'rgba(158, 27, 50, 0.6)';
    const fill = isInside ? fillIn : fillDim;
    const r = isInside ? 2.5 : 1.5;

    // Y axis
    ctx.beginPath();
    ctx.arc(mapY(p.y), Y_AXIS_Y + (p.verticalOffset * 250), r, 0, Math.PI * 2);
    ctx.fillStyle = fill;
    ctx.fill();

    // U axis
    ctx.beginPath();
    ctx.arc(mapU(p.u), U_AXIS_Y + (p.verticalOffset * 250), r, 0, Math.PI * 2);
    ctx.fillStyle = fill;
    ctx.fill();
  }

  // Update readouts
  updateStats(actualDeltaU, deltaYv, uMin);
}

function drawAxis(yPos, minVal, maxVal, label, step) {
  ctx.strokeStyle = '#a09888';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(PAD_X, yPos);
  ctx.lineTo(PAD_X + W, yPos);
  ctx.stroke();

  ctx.fillStyle = '#8a8078';
  ctx.font = '500 14px "IBM Plex Mono", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';

  let start = Math.ceil(minVal / step) * step;
  for (let v = start; v <= maxVal; v += step) {
    if (Math.abs(v) < 0.001) v = 0;
    const tx = PAD_X + ((v - minVal) / (maxVal - minVal)) * W;
    ctx.strokeStyle = '#a09888'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(tx, yPos - 5); ctx.lineTo(tx, yPos + 5); ctx.stroke();
    ctx.fillStyle = '#8a8078';
    ctx.fillText(v.toFixed(1), tx, yPos + 12);
  }

  ctx.fillStyle = '#2c2a26';
  ctx.font = '600 20px "IBM Plex Mono", monospace';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  ctx.fillText(label.toUpperCase(), PAD_X - 16, yPos);
}

function updateStats(actualDu, dy, uCorner) {
  document.getElementById('valDu').textContent = actualDu.toFixed(3);
  document.getElementById('valDy').textContent = dy.toFixed(3);

  const ratio = actualDu > 0 ? (dy / actualDu) : 0;
  document.getElementById('valRatio').textContent = ratio.toFixed(3);

  // |dy/du| at corner u = uMin
  let deriv = 0;
  if (uCorner > 0) {
    deriv = 1 / (3 * Math.pow(2, 1 / 3) * Math.pow(uCorner, 2 / 3));
  }
  document.getElementById('valDeriv').textContent = deriv.toFixed(3);
}

// Controls
const uSlider = document.getElementById('uSlider');
const duSlider = document.getElementById('duSlider');

function handleUpdate() {
  uCenter = parseFloat(uSlider.value);
  deltaU = parseFloat(duSlider.value);
  document.getElementById('uVal').textContent = uCenter.toFixed(2);
  document.getElementById('duVal').textContent = deltaU.toFixed(2);
  draw();
}

uSlider.addEventListener('input', handleUpdate);
duSlider.addEventListener('input', handleUpdate);

// Formulas
katex.render(String.raw`f_Y(y) = 2y,\;\; 0 \le y \le 1`, document.getElementById('formulaY'), { throwOnError: false });
katex.render(String.raw`U = h(Y) = 2Y^3`, document.getElementById('formulaTransform'), { throwOnError: false });
katex.render(String.raw`f_U(u) = f_Y\!\bigl(h^{-1}(u)\bigr)\left|\frac{dy}{du}\right|`, document.getElementById('formulaDeriv'), { throwOnError: false });

generateParticles();
handleUpdate();
</script>
</body>
</html>
