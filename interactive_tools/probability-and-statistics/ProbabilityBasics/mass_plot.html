<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Mass Visualization — Exponential</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;500&display=swap');

  :root {
    --bg: #2a2f38;
    --surface: #333a45;
    --text: #e0e4ea;
    --text-dim: #94a0b0;
    --accent: #5aadff;
    --accent-glow: rgba(90, 173, 255, 0.2);
    --axis: #6a7282;
    --scan: #e05252;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }

  .container { width: 100%; max-width: 960px; }

  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .header h1 {
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 300;
    font-size: 1.25rem;
    letter-spacing: 0.02em;
  }

  .stats {
    display: flex;
    gap: 2.5rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
  }

  .stat-group label {
    color: var(--text-dim);
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 0.2rem;
  }

  .stat-group span {
    font-weight: 600;
    color: var(--text);
    font-size: 0.95rem;
  }

  .formula-bar {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    margin-bottom: 1.25rem;
    padding: 0.75rem 1.25rem;
    background: rgba(90, 173, 255, 0.07);
    border: 1px solid rgba(90, 173, 255, 0.15);
    border-radius: 6px;
    flex-wrap: wrap;
  }

  .formula-bar .katex { font-size: 1.0rem; color: var(--text); }

  .canvas-wrap {
    position: relative;
    background: var(--surface);
    border-radius: 8px;
    padding: 2rem 2.5rem 3rem;
    box-shadow: 0 4px 30px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  canvas { display: block; width: 100%; height: auto; cursor: crosshair; }

  .controls {
    margin-top: 1.5rem;
    display: flex;
    gap: 1.5rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .control-group {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .control-group label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 120px;
    height: 4px;
    background: var(--axis);
    border-radius: 2px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 8px var(--accent-glow);
  }

  .value-display {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--accent);
    min-width: 3ch;
    text-align: right;
  }

  .btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.5rem 1.2rem;
    background: transparent;
    border: 1px solid var(--axis);
    color: var(--text-dim);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 12px var(--accent-glow);
  }

  .btn-scan {
    border-color: var(--scan);
    color: var(--scan);
  }

  .btn-scan:hover {
    box-shadow: 0 0 12px rgba(224, 82, 82, 0.3);
  }

  .tooltip {
    position: absolute;
    pointer-events: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    background: rgba(30, 35, 42, 0.92);
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid var(--axis);
    opacity: 0;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>PDF Mass Visualization</h1>
    <div class="stats">
      <div class="stat-group">
        <label>Mode</label>
        <span id="modeLabel">Particle Cloud</span>
      </div>
      <div class="stat-group">
        <label>Lambda (λ)</label>
        <span id="lambdaLabel">0.33</span>
      </div>
      <div class="stat-group">
        <label>Mean (1/λ)</label>
        <span id="meanLabel">3.03</span>
      </div>
    </div>
  </div>

  <div class="formula-bar">
    <span id="formulaPdf"></span>
    <span style="margin-left: 1.5rem;" id="formulaCdf"></span>
    <span style="margin-left: 1.5rem;" id="formulaEcdf"></span>
  </div>

  <div class="canvas-wrap">
    <canvas id="plot" width="1800" height="950"></canvas>
    <div class="tooltip" id="tooltip"></div>
  </div>

  <div class="controls">
    <div class="control-group">
      <label>λ</label>
      <input type="range" id="lambdaSlider" min="0.1" max="2" step="0.01" value="0.33">
      <span class="value-display" id="lambdaVal">0.33</span>
    </div>
    <div class="control-group">
      <label>N</label>
      <input type="range" id="nSlider" min="50" max="50000" step="50" value="5000">
      <span class="value-display" id="nVal">5k</span>
    </div>
    <button class="btn" id="redrawBtn">Redraw</button>
    <button class="btn btn-scan" id="scanBtn">▶ Scan CDF</button>
    <div class="control-group">
      <label>Speed</label>
      <input type="range" id="speedSlider" min="1" max="10" step="1" value="4">
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('plot');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');

let lambda = 1 / 3;
let N = 5000;
let particles = [];
let sortedX = [];
let scanX = null;
let scanAnim = null;

const PAD = { left: 50, right: 30, top: 360, bottom: 50 };
const xMaxPlot = 15;

function canvasX(x) {
  return PAD.left + (x / xMaxPlot) * (canvas.width - PAD.left - PAD.right);
}
function canvasY(y) {
  const plotH = canvas.height - PAD.top - PAD.bottom;
  const mid = PAD.top + plotH / 2;
  return mid - y * plotH;
}

function randExp(lam) {
  return -Math.log(1 - Math.random()) / lam;
}

function generateParticles() {
  particles = [];
  for (let i = 0; i < N; i++) {
    particles.push({
      x: randExp(lambda),
      y: (Math.random() - 0.5) * 0.3
    });
  }
  sortedX = particles.map(p => p.x).sort((a, b) => a - b);
}

// ─── Axis ───
function drawAxis() {
  const y0 = canvasY(0);
  const x0 = canvasX(0);
  const xEnd = canvasX(xMaxPlot);

  ctx.setLineDash([12, 8]);
  ctx.strokeStyle = '#8a92a0';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(xEnd, y0); ctx.stroke();
  ctx.setLineDash([]);

  const axisY = canvas.height - PAD.bottom;
  ctx.strokeStyle = '#6a7282';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(x0, axisY); ctx.lineTo(xEnd, axisY); ctx.stroke();

  ctx.fillStyle = '#94a0b0';
  ctx.font = '600 22px "IBM Plex Mono", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  for (let v = 0; v <= xMaxPlot; v += 2.5) {
    const tx = canvasX(v);
    ctx.strokeStyle = '#6a7282';
    ctx.beginPath(); ctx.moveTo(tx, axisY); ctx.lineTo(tx, axisY + 8); ctx.stroke();
    ctx.fillText(v % 1 === 0 ? v.toFixed(0) : v.toFixed(1), tx, axisY + 14);
  }

  ctx.font = '400 20px "IBM Plex Mono", monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#8a92a0';
  ctx.fillText('x = 0', x0 - 5, y0 + 18);
}

// ─── Cloud — adaptive sizing, scan highlighting ───
function drawCloudWithScan() {
  const rOuter = N < 200 ? 7 : N < 1000 ? 4.5 : 3.5;
  const rInner = N < 200 ? 4 : N < 1000 ? 2.5 : 2.0;
  const aOOn  = N < 200 ? 0.30 : N < 1000 ? 0.15 : 0.08;
  const aOOff = N < 200 ? 0.15 : N < 1000 ? 0.07 : 0.035;
  const aIOn  = N < 200 ? 0.40 : N < 1000 ? 0.20 : 0.07;
  const aIOff = N < 200 ? 0.20 : N < 1000 ? 0.10 : 0.03;

  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    if (p.x > xMaxPlot) continue;
    const cx = canvasX(p.x);
    const cy = canvasY(p.y);
    const on = scanX !== null && p.x <= scanX;
    ctx.beginPath();
    ctx.arc(cx, cy, rOuter, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(180, 200, 230, ${on ? aOOn : aOOff})`;
    ctx.fill();
  }
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    if (p.x > xMaxPlot) continue;
    const cx = canvasX(p.x);
    const cy = canvasY(p.y);
    const on = scanX !== null && p.x <= scanX;
    ctx.beginPath();
    ctx.arc(cx, cy, rInner, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(220, 235, 255, ${on ? aIOn : aIOff})`;
    ctx.fill();
  }
}

// ─── Scan line ───
function drawScanLine() {
  if (scanX === null) return;
  const sx = canvasX(Math.min(Math.max(scanX, 0), xMaxPlot));
  const y0 = PAD.top, y1 = canvas.height - PAD.bottom;

  ctx.save();
  ctx.shadowColor = 'rgba(224, 82, 82, 0.5)';
  ctx.shadowBlur = 16;
  ctx.strokeStyle = 'rgba(224, 82, 82, 0.85)';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(sx, y0); ctx.lineTo(sx, y1); ctx.stroke();
  ctx.restore();

  ctx.strokeStyle = 'rgba(224, 82, 82, 0.95)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(sx, y0); ctx.lineTo(sx, y1); ctx.stroke();

  ctx.fillStyle = 'rgba(224, 82, 82, 0.95)';
  ctx.font = '600 20px "IBM Plex Mono", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText('scan', sx, y0 - 4);
}

// ════════════════════════════════════════
// Three panels
// ════════════════════════════════════════
const PANEL = {
  gap: 16, ih: 300, iy: 12,
  ip: { left: 50, right: 16, top: 44, bottom: 44 },
  get panelW() { return (canvas.width - 40 - this.gap * 2) / 3; }
};

function panelOriginX(idx) { return 20 + idx * (PANEL.panelW + PANEL.gap); }

function drawPanelBg(ix, borderColor) {
  ctx.save();
  ctx.globalAlpha = 0.85;
  ctx.fillStyle = '#252b34';
  ctx.beginPath(); ctx.roundRect(ix, PANEL.iy, PANEL.panelW, PANEL.ih, 8); ctx.fill();
  ctx.restore();
  ctx.strokeStyle = borderColor;
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(ix, PANEL.iy, PANEL.panelW, PANEL.ih, 8); ctx.stroke();
}

function pb(ix) {
  const px0 = ix + PANEL.ip.left, px1 = ix + PANEL.panelW - PANEL.ip.right;
  const py0 = PANEL.iy + PANEL.ip.top, py1 = PANEL.iy + PANEL.ih - PANEL.ip.bottom;
  return { px0, px1, py0, py1, pw: px1 - px0, ph: py1 - py0 };
}

function drawPanelAxes(b) {
  ctx.strokeStyle = 'rgba(130, 140, 160, 0.45)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(b.px0, b.py1); ctx.lineTo(b.px1, b.py1); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(b.px0, b.py0); ctx.lineTo(b.px0, b.py1); ctx.stroke();
}

function drawPanelXTicks(b) {
  ctx.fillStyle = 'rgba(170, 180, 200, 0.6)';
  ctx.font = '400 13px "IBM Plex Mono", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  for (let v = 0; v <= xMaxPlot; v += 5) {
    const tx = b.px0 + (v / xMaxPlot) * b.pw;
    ctx.fillText(v, tx, b.py1 + 5);
    ctx.strokeStyle = 'rgba(130, 140, 160, 0.45)';
    ctx.beginPath(); ctx.moveTo(tx, b.py1); ctx.lineTo(tx, b.py1 + 4); ctx.stroke();
  }
}

function pScanLine(b) {
  if (scanX === null) return;
  const sx = b.px0 + (Math.min(Math.max(scanX, 0), xMaxPlot) / xMaxPlot) * b.pw;
  if (sx >= b.px0 && sx <= b.px1) {
    ctx.strokeStyle = 'rgba(224, 82, 82, 0.45)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(sx, b.py0); ctx.lineTo(sx, b.py1); ctx.stroke();
  }
}

// ─── PANEL 1: f(x) ───
function drawPdfInset() {
  const ix = panelOriginX(0);
  drawPanelBg(ix, 'rgba(90, 173, 255, 0.25)');
  const b = pb(ix);
  const yMax = lambda * 1.25;

  ctx.fillStyle = 'rgba(220, 225, 235, 0.65)';
  ctx.font = '500 20px "IBM Plex Mono", monospace';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText('f(x)', ix + PANEL.ip.left, PANEL.iy + 12);

  drawPanelAxes(b); drawPanelXTicks(b);

  // λ tick
  const yLam = b.py0 + (1 - lambda / yMax) * b.ph;
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(170, 180, 200, 0.6)';
  ctx.fillText('λ', b.px0 - 6, yLam);
  ctx.setLineDash([5, 5]);
  ctx.strokeStyle = 'rgba(90, 173, 255, 0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(b.px0, yLam); ctx.lineTo(b.px1, yLam); ctx.stroke();
  ctx.setLineDash([]);

  // Shaded area up to scan
  if (scanX !== null && scanX > 0) {
    const clipX = Math.min(scanX, xMaxPlot);
    ctx.beginPath();
    for (let i = 0; i <= 120; i++) {
      const xv = (i / 120) * clipX;
      const yv = lambda * Math.exp(-lambda * xv);
      const sx = b.px0 + (xv / xMaxPlot) * b.pw;
      const sy = b.py0 + (1 - yv / yMax) * b.ph;
      i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
    }
    ctx.lineTo(b.px0 + (clipX / xMaxPlot) * b.pw, b.py1);
    ctx.lineTo(b.px0, b.py1);
    ctx.closePath();
    ctx.fillStyle = 'rgba(224, 82, 82, 0.12)';
    ctx.fill();
  }

  // Full curve
  ctx.beginPath();
  for (let i = 0; i <= 200; i++) {
    const xv = (i / 200) * xMaxPlot;
    const yv = lambda * Math.exp(-lambda * xv);
    const sx = b.px0 + (xv / xMaxPlot) * b.pw;
    const sy = b.py0 + (1 - yv / yMax) * b.ph;
    i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
  }
  ctx.strokeStyle = 'rgba(90, 173, 255, 0.85)';
  ctx.lineWidth = 2.5;
  ctx.stroke();

  // Faint fill
  ctx.lineTo(b.px0 + b.pw, b.py1);
  ctx.lineTo(b.px0, b.py1);
  ctx.closePath();
  ctx.fillStyle = 'rgba(90, 173, 255, 0.06)';
  ctx.fill();

  pScanLine(b);
}

// ─── PANEL 2: F(x) ───
function drawCdfInset() {
  const ix = panelOriginX(1);
  drawPanelBg(ix, 'rgba(130, 200, 160, 0.2)');
  const b = pb(ix);
  const yMax = 1.1;

  ctx.fillStyle = 'rgba(220, 225, 235, 0.65)';
  ctx.font = '500 20px "IBM Plex Mono", monospace';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText('F(x)', ix + PANEL.ip.left, PANEL.iy + 12);

  drawPanelAxes(b); drawPanelXTicks(b);

  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(170, 180, 200, 0.6)';
  for (const yt of [0.5, 1.0]) {
    const yy = b.py0 + (1 - yt / yMax) * b.ph;
    ctx.fillText(yt.toFixed(1), b.px0 - 6, yy);
    ctx.setLineDash([4, 5]);
    ctx.strokeStyle = 'rgba(130, 200, 160, 0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(b.px0, yy); ctx.lineTo(b.px1, yy); ctx.stroke();
    ctx.setLineDash([]);
  }

  ctx.beginPath();
  for (let i = 0; i <= 200; i++) {
    const xv = (i / 200) * xMaxPlot;
    const Fv = 1 - Math.exp(-lambda * xv);
    const sx = b.px0 + (xv / xMaxPlot) * b.pw;
    const sy = b.py0 + (1 - Fv / yMax) * b.ph;
    i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
  }
  ctx.strokeStyle = 'rgba(130, 200, 160, 0.85)';
  ctx.lineWidth = 2.5;
  ctx.stroke();

  pScanLine(b);

  if (scanX !== null && scanX >= 0) {
    const xc = Math.min(scanX, xMaxPlot);
    const Fs = 1 - Math.exp(-lambda * xc);
    const dx = b.px0 + (xc / xMaxPlot) * b.pw;
    const dy = b.py0 + (1 - Fs / yMax) * b.ph;
    ctx.beginPath(); ctx.arc(dx, dy, 5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(224, 82, 82, 0.9)'; ctx.fill();

    ctx.fillStyle = 'rgba(130, 200, 160, 0.85)';
    ctx.font = '600 16px "IBM Plex Mono", monospace';
    ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
    ctx.fillText(`F = ${Fs.toFixed(3)}`, b.px0 + b.pw * 0.55, b.py0 + 16);
  }
}

// ─── PANEL 3: F̂(x) ───
function drawEcdfInset() {
  const ix = panelOriginX(2);
  drawPanelBg(ix, 'rgba(100, 180, 230, 0.2)');
  const b = pb(ix);
  const yMax = 1.1;

  ctx.fillStyle = 'rgba(220, 225, 235, 0.65)';
  ctx.font = '500 20px "IBM Plex Mono", monospace';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText('F̂(x)', ix + PANEL.ip.left, PANEL.iy + 12);

  drawPanelAxes(b); drawPanelXTicks(b);

  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(170, 180, 200, 0.6)';
  for (const yt of [0.5, 1.0]) {
    const yy = b.py0 + (1 - yt / yMax) * b.ph;
    ctx.fillText(yt.toFixed(1), b.px0 - 6, yy);
    ctx.setLineDash([4, 5]);
    ctx.strokeStyle = 'rgba(100, 180, 230, 0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(b.px0, yy); ctx.lineTo(b.px1, yy); ctx.stroke();
    ctx.setLineDash([]);
  }

  // Faint theoretical CDF reference
  ctx.beginPath();
  for (let i = 0; i <= 200; i++) {
    const xv = (i / 200) * xMaxPlot;
    const Fv = 1 - Math.exp(-lambda * xv);
    const sx = b.px0 + (xv / xMaxPlot) * b.pw;
    const sy = b.py0 + (1 - Fv / yMax) * b.ph;
    i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
  }
  ctx.strokeStyle = 'rgba(130, 200, 160, 0.18)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  if (scanX === null) return;

  const n = sortedX.length;
  const drawUpTo = Math.min(Math.max(scanX, 0), xMaxPlot);

  let countBelow = 0;
  for (let i = 0; i < n; i++) {
    if (sortedX[i] <= drawUpTo) countBelow = i + 1; else break;
  }

  ctx.beginPath();
  let prevPy = b.py0 + b.ph; // F̂ = 0
  ctx.moveTo(b.px0, prevPy);

  const maxSteps = 600;
  const stepSize = Math.max(1, Math.floor(countBelow / maxSteps));

  for (let i = 0; i < countBelow; i += stepSize) {
    const xv = sortedX[i];
    if (xv > xMaxPlot) break;
    const Fhat = (i + 1) / n;
    const sx = b.px0 + (xv / xMaxPlot) * b.pw;
    const sy = b.py0 + (1 - Fhat / yMax) * b.ph;
    ctx.lineTo(sx, prevPy);
    ctx.lineTo(sx, sy);
    prevPy = sy;
  }

  const endPx = b.px0 + (drawUpTo / xMaxPlot) * b.pw;
  ctx.lineTo(endPx, prevPy);
  ctx.strokeStyle = 'rgba(100, 180, 230, 0.9)';
  ctx.lineWidth = 2;
  ctx.stroke();

  const Fhat = countBelow / n;
  ctx.beginPath();
  ctx.arc(endPx, prevPy, 5.5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(224, 82, 82, 0.9)';
  ctx.fill();

  pScanLine(b);

  ctx.fillStyle = 'rgba(224, 82, 82, 0.9)';
  ctx.font = '600 16px "IBM Plex Mono", monospace';
  ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
  ctx.fillText(`F̂ = ${Fhat.toFixed(3)}`, b.px0 + b.pw * 0.55, b.py0 + 16);
}

// ─── Full render ───
function fullDraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawAxis();
  drawCloudWithScan();
  drawScanLine();
  drawPdfInset();
  drawCdfInset();
  drawEcdfInset();
}

// ─── Scan animation ───
function startScan() {
  if (scanAnim) cancelAnimationFrame(scanAnim);
  const speed = parseInt(document.getElementById('speedSlider').value);
  const totalFrames = Math.round(400 / speed);
  let frame = 0;
  const s0 = -0.5, s1 = xMaxPlot + 0.5;

  function step() {
    scanX = s0 + (s1 - s0) * (frame / totalFrames);
    fullDraw();
    frame++;
    if (frame <= totalFrames) scanAnim = requestAnimationFrame(step);
    else { scanX = s1; fullDraw(); }
  }
  step();
}

// ─── Controls ───
const lambdaSlider = document.getElementById('lambdaSlider');
const nSlider = document.getElementById('nSlider');
const lambdaVal = document.getElementById('lambdaVal');
const nVal = document.getElementById('nVal');
const lambdaLabel = document.getElementById('lambdaLabel');
const meanLabel = document.getElementById('meanLabel');

function updateLabels() {
  const lv = parseFloat(lambdaSlider.value);
  lambdaVal.textContent = lv.toFixed(2);
  lambdaLabel.textContent = lv.toFixed(2);
  meanLabel.textContent = (1 / lv).toFixed(2);
  const n = parseInt(nSlider.value);
  nVal.textContent = n >= 1000 ? (n / 1000).toFixed(0) + 'k' : n;
}

lambdaSlider.addEventListener('input', () => { updateLabels(); renderFormulas(); });
nSlider.addEventListener('input', updateLabels);

document.getElementById('redrawBtn').addEventListener('click', () => {
  if (scanAnim) cancelAnimationFrame(scanAnim);
  scanX = null;
  lambda = parseFloat(lambdaSlider.value);
  N = parseInt(nSlider.value);
  generateParticles();
  fullDraw();
});

document.getElementById('scanBtn').addEventListener('click', startScan);

// Tooltip
const wrap = document.querySelector('.canvas-wrap');
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const mx = (e.clientX - rect.left) * scaleX;
  const plotW = canvas.width - PAD.left - PAD.right;
  const xVal = ((mx - PAD.left) / plotW) * xMaxPlot;
  if (xVal >= 0 && xVal <= xMaxPlot) {
    const f = lambda * Math.exp(-lambda * xVal);
    const F = 1 - Math.exp(-lambda * xVal);
    tooltip.textContent = `x = ${xVal.toFixed(2)}   f(x) = ${f.toFixed(4)}   F(x) = ${F.toFixed(4)}`;
    tooltip.style.left = (e.clientX - wrap.getBoundingClientRect().left + 12) + 'px';
    tooltip.style.top = (e.clientY - wrap.getBoundingClientRect().top - 30) + 'px';
    tooltip.style.opacity = 1;
  } else { tooltip.style.opacity = 0; }
});
canvas.addEventListener('mouseleave', () => { tooltip.style.opacity = 0; });

// Formulas
function renderFormulas() {
  const lv = parseFloat(lambdaSlider.value);
  katex.render(
    `f(x) = \\lambda e^{-\\lambda x} = ${lv.toFixed(2)}\\,e^{-${lv.toFixed(2)}x}`,
    document.getElementById('formulaPdf'),
    { throwOnError: false }
  );
  katex.render(
    String.raw`F(x) = 1 - e^{-\lambda x}`,
    document.getElementById('formulaCdf'),
    { throwOnError: false }
  );
  katex.render(
    String.raw`\hat{F}_n(x) = \frac{1}{n}\sum_{i=1}^{n}\mathbf{1}(X_i \leq x)`,
    document.getElementById('formulaEcdf'),
    { throwOnError: false }
  );
}
renderFormulas();

// Init
generateParticles();
fullDraw();
</script>
</body>
