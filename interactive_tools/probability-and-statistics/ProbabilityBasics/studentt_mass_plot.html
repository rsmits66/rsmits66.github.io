<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Mass Visualization — Student-t</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;500&display=swap');

  :root {
    --bg: #ffffff;
    --surface: #f7f7f7;
    --text: #2c2a26;
    --text-dim: #6b6560;
    --accent: #9E1B32;
    --accent-glow: rgba(158, 27, 50, 0.15);
    --axis: #a09888;
    --scan: #cc3344;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }

  .container { width: 100%; max-width: 960px; }

  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .header h1 {
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 300;
    font-size: 1.25rem;
    letter-spacing: 0.02em;
  }

  .stats {
    display: flex;
    gap: 1.8rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
  }

  .stat-group label {
    color: var(--text-dim);
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 0.2rem;
  }

  .stat-group span {
    font-weight: 600;
    color: var(--text);
    font-size: 0.9rem;
  }

  .formula-bar {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin-bottom: 1.25rem;
    padding: 0.75rem 1.25rem;
    background: rgba(158, 27, 50, 0.06);
    border: 1px solid rgba(158, 27, 50, 0.15);
    border-radius: 6px;
    flex-wrap: wrap;
  }

  .formula-bar .katex { font-size: 0.82rem; color: var(--text); }

  .canvas-wrap {
    position: relative;
    background: var(--surface);
    border-radius: 8px;
    padding: 2rem 2.5rem 3rem;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.04);
  }

  canvas { display: block; width: 100%; height: auto; cursor: crosshair; }

  .controls {
    margin-top: 1.5rem;
    display: flex;
    gap: 1.2rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .control-group {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .control-group label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 90px;
    height: 4px;
    background: var(--axis);
    border-radius: 2px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 8px var(--accent-glow);
  }

  .value-display {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--accent);
    min-width: 3ch;
    text-align: right;
  }

  .btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.5rem 1.2rem;
    background: transparent;
    border: 1px solid var(--axis);
    color: var(--text-dim);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 12px var(--accent-glow);
  }

  .btn-scan { border-color: var(--scan); color: var(--scan); }
  .btn-scan:hover { box-shadow: 0 0 12px rgba(204, 51, 68, 0.2); }

  .tooltip {
    position: absolute;
    pointer-events: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    background: rgba(255, 255, 255, 0.96);
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid var(--axis);
    opacity: 0;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>PDF Mass Visualization</h1>
    <div class="stats">
      <div class="stat-group">
        <label>Distribution</label>
        <span>Student-t</span>
      </div>
      <div class="stat-group">
        <label>ν (d.f.)</label>
        <span id="nuLabel">5</span>
      </div>
      <div class="stat-group">
        <label>E[X]</label>
        <span id="meanLabel">0</span>
      </div>
      <div class="stat-group">
        <label>Var</label>
        <span id="varLabel">1.667</span>
      </div>
      <div class="stat-group">
        <label>Kurtosis</label>
        <span id="kurtLabel">6.00</span>
      </div>
    </div>
  </div>

  <div class="formula-bar">
    <span id="formulaPdf"></span>
    <span style="margin-left: 0.6rem;" id="formulaConst"></span>
    <span style="margin-left: 0.6rem;" id="formulaEcdf"></span>
  </div>

  <div class="canvas-wrap">
    <canvas id="plot" width="1800" height="850"></canvas>
    <div class="tooltip" id="tooltip"></div>
  </div>

  <div class="controls">
    <div class="control-group">
      <label>Nu (ν)</label>
      <input type="range" id="nuSlider" min="1" max="50" step="1" value="5">
      <span class="value-display" id="nuVal">5</span>
    </div>
    <div class="control-group">
      <label>N</label>
      <input type="range" id="nSlider" min="50" max="50000" step="50" value="5000">
      <span class="value-display" id="nVal">5k</span>
    </div>
    <button class="btn" id="redrawBtn">Redraw</button>
    <button class="btn btn-scan" id="scanBtn">▶ Scan CDF</button>
    <div class="control-group">
      <label>Speed</label>
      <input type="range" id="speedSlider" min="1" max="10" step="1" value="4">
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('plot');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');

let nu = 5;
let N = 5000;
let particles = [];
let sortedX = [];
let scanX = null;
let scanAnim = null;

let xLo, xHi;

const PAD = { left: 50, right: 30, top: 510, bottom: 50 };

function updateRange() {
  // t-distribution has heavier tails for small ν
  const spread = nu <= 2 ? 12 : nu <= 5 ? 8 : 6;
  xLo = -spread;
  xHi = spread;
}
updateRange();

function canvasX(x) {
  return PAD.left + ((x - xLo) / (xHi - xLo)) * (canvas.width - PAD.left - PAD.right);
}
function canvasY(y) {
  const plotH = canvas.height - PAD.top - PAD.bottom;
  const mid = PAD.top + plotH / 2;
  return mid - y * plotH;
}

// ═══════════════════════════════════
// Student-t math
// ═══════════════════════════════════

function logGamma(x) {
  const g = 7;
  const c = [
    0.99999999999980993, 676.5203681218851, -1259.1392167224028,
    771.32342877765313, -176.61502916214059, 12.507343278686905,
    -0.13857109526572012, 9.9843695780195716e-6, 1.5056327351493116e-7
  ];
  if (x < 0.5) return Math.log(Math.PI / Math.sin(Math.PI * x)) - logGamma(1 - x);
  x -= 1;
  let t = x + g + 0.5;
  let s = c[0];
  for (let i = 1; i < g + 2; i++) s += c[i] / (x + i);
  return 0.5 * Math.log(2 * Math.PI) + (x + 0.5) * Math.log(t) - t + Math.log(s);
}

// f(x) = Γ((ν+1)/2) / (√(νπ) Γ(ν/2)) * (1 + x²/ν)^{-(ν+1)/2}
function tPdf(x) {
  const logC = logGamma((nu + 1) / 2) - logGamma(nu / 2) - 0.5 * Math.log(nu * Math.PI);
  return Math.exp(logC - ((nu + 1) / 2) * Math.log(1 + x * x / nu));
}

// CDF via regularized incomplete beta
function betaCF(x, aa, bb) {
  const MAXIT = 200, EPS = 1e-14, FPMIN = 1e-30;
  let qab = aa + bb, qap = aa + 1, qam = aa - 1;
  let c = 1, d = 1 - qab * x / qap;
  if (Math.abs(d) < FPMIN) d = FPMIN;
  d = 1 / d;
  let h = d;
  for (let m = 1; m <= MAXIT; m++) {
    const m2 = 2 * m;
    let an = m * (bb - m) * x / ((qam + m2) * (aa + m2));
    d = 1 + an * d; if (Math.abs(d) < FPMIN) d = FPMIN; d = 1 / d;
    c = 1 + an / c; if (Math.abs(c) < FPMIN) c = FPMIN;
    h *= d * c;
    an = -(aa + m) * (qab + m) * x / ((aa + m2) * (qap + m2));
    d = 1 + an * d; if (Math.abs(d) < FPMIN) d = FPMIN; d = 1 / d;
    c = 1 + an / c; if (Math.abs(c) < FPMIN) c = FPMIN;
    const del = d * c;
    h *= del;
    if (Math.abs(del - 1) < EPS) break;
  }
  return h;
}

function regBetaI(x, aa, bb) {
  if (x <= 0) return 0;
  if (x >= 1) return 1;
  const bt = Math.exp(aa * Math.log(x) + bb * Math.log(1 - x)
    - logGamma(aa) - logGamma(bb) + logGamma(aa + bb));
  if (x < (aa + 1) / (aa + bb + 2)) return bt * betaCF(x, aa, bb) / aa;
  return 1 - bt * betaCF(1 - x, bb, aa) / bb;
}

function tCdf(x) {
  // F(x) = 1/2 + sign(x)/2 * I_{ν/(ν+x²)}... actually:
  // F(x) = I_{(x+√(x²+ν))/(2√(x²+ν))}(ν/2, ν/2) ... complex
  // Simpler: F(x) = 1 - 1/2 * I_{ν/(ν+x²)}(ν/2, 1/2) for x ≥ 0
  const t2 = x * x;
  const w = nu / (nu + t2);
  const ib = regBetaI(w, nu / 2, 0.5);
  if (x >= 0) return 1 - 0.5 * ib;
  return 0.5 * ib;
}

// Sampling: T = Z / √(V/ν) where Z ~ N(0,1), V ~ χ²(ν)
function randNormal() {
  const u1 = Math.random(), u2 = Math.random();
  return Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
}

function randGammaMT(alpha) {
  if (alpha < 1) return randGammaMT(alpha + 1) * Math.pow(Math.random(), 1 / alpha);
  const d = alpha - 1 / 3, c = 1 / Math.sqrt(9 * d);
  while (true) {
    let x, v;
    do {
      x = randNormal();
      v = 1 + c * x;
    } while (v <= 0);
    v = v * v * v;
    const u = Math.random();
    if (u < 1 - 0.0331 * x * x * x * x) return d * v;
    if (Math.log(u) < 0.5 * x * x + d * (1 - v + Math.log(v))) return d * v;
  }
}

function randChi2() {
  return randGammaMT(nu / 2) * 2;
}

function randT() {
  const z = randNormal();
  const v = randChi2();
  return z / Math.sqrt(v / nu);
}

function generateParticles() {
  updateRange();
  particles = [];
  for (let i = 0; i < N; i++) {
    particles.push({ x: randT(), y: (Math.random() - 0.5) * 0.35 });
  }
  sortedX = particles.map(p => p.x).sort((a, b) => a - b);
}

// ─── Axis ───
function drawAxis() {
  const y0 = canvasY(0);
  const x0 = canvasX(xLo), xEnd = canvasX(xHi);

  ctx.setLineDash([12, 8]);
  ctx.strokeStyle = '#a0988c'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(xEnd, y0); ctx.stroke();
  ctx.setLineDash([]);

  const axisY = canvas.height - PAD.bottom;
  ctx.strokeStyle = '#a09888'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(x0, axisY); ctx.lineTo(xEnd, axisY); ctx.stroke();

  // Ticks
  const range = xHi - xLo;
  const tickStep = range <= 8 ? 1 : range <= 16 ? 2 : 4;
  ctx.fillStyle = '#5a5248';
  ctx.font = '600 20px "IBM Plex Mono", monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  for (let v = Math.ceil(xLo); v <= Math.floor(xHi); v += tickStep) {
    const tx = canvasX(v);
    ctx.strokeStyle = '#a09888';
    ctx.beginPath(); ctx.moveTo(tx, axisY); ctx.lineTo(tx, axisY + 8); ctx.stroke();
    ctx.fillText(v, tx, axisY + 12);
  }

  // 0 label
  ctx.fillStyle = '#8a8078'; ctx.font = '400 16px "IBM Plex Mono", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('μ = 0', canvasX(0), y0 + 16);
}

// ─── Cloud ───
function drawCloudWithScan() {
  const rO = N < 200 ? 7 : N < 1000 ? 4.5 : 3.5;
  const rI = N < 200 ? 4 : N < 1000 ? 2.5 : 2.0;
  const aOOn = N < 200 ? 0.40 : N < 1000 ? 0.22 : 0.12;
  const aOOff = N < 200 ? 0.22 : N < 1000 ? 0.10 : 0.05;
  const aIOn = N < 200 ? 0.55 : N < 1000 ? 0.30 : 0.12;
  const aIOff = N < 200 ? 0.30 : N < 1000 ? 0.15 : 0.05;

  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    if (p.x < xLo || p.x > xHi) continue;
    const cx = canvasX(p.x), cy = canvasY(p.y);
    const on = scanX !== null && p.x <= scanX;
    ctx.beginPath(); ctx.arc(cx, cy, rO, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(158, 27, 50, ${on ? aOOn : aOOff})`; ctx.fill();
  }
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    if (p.x < xLo || p.x > xHi) continue;
    const cx = canvasX(p.x), cy = canvasY(p.y);
    const on = scanX !== null && p.x <= scanX;
    ctx.beginPath(); ctx.arc(cx, cy, rI, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(130, 20, 42, ${on ? aIOn : aIOff})`; ctx.fill();
  }
}

// ─── Scan line ───
function drawScanLine() {
  if (scanX === null) return;
  const sx = canvasX(Math.min(Math.max(scanX, xLo), xHi));
  const y0 = PAD.top, y1 = canvas.height - PAD.bottom;

  ctx.save();
  ctx.shadowColor = 'rgba(204, 51, 68, 0.4)'; ctx.shadowBlur = 16;
  ctx.strokeStyle = 'rgba(204, 51, 68, 0.75)'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(sx, y0); ctx.lineTo(sx, y1); ctx.stroke();
  ctx.restore();

  ctx.strokeStyle = 'rgba(204, 51, 68, 0.9)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(sx, y0); ctx.lineTo(sx, y1); ctx.stroke();

  ctx.fillStyle = 'rgba(204, 51, 68, 0.9)';
  ctx.font = '600 20px "IBM Plex Mono", monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.fillText('scan', sx, y0 - 4);
}

// ════════════════════════════════════════
// Three panels
// ════════════════════════════════════════
const PANEL = {
  gap: 16, ih: 450, iy: 12,
  ip: { left: 50, right: 16, top: 44, bottom: 44 },
  get panelW() { return (canvas.width - 40 - this.gap * 2) / 3; }
};

function pox(idx) { return 20 + idx * (PANEL.panelW + PANEL.gap); }

function drawPanelBg(ix, bc) {
  ctx.save(); ctx.globalAlpha = 0.92; ctx.fillStyle = '#f0f0f0';
  ctx.beginPath(); ctx.roundRect(ix, PANEL.iy, PANEL.panelW, PANEL.ih, 8); ctx.fill();
  ctx.restore();
  ctx.strokeStyle = bc; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(ix, PANEL.iy, PANEL.panelW, PANEL.ih, 8); ctx.stroke();
}

function bnd(ix) {
  const px0 = ix + PANEL.ip.left, px1 = ix + PANEL.panelW - PANEL.ip.right;
  const py0 = PANEL.iy + PANEL.ip.top, py1 = PANEL.iy + PANEL.ih - PANEL.ip.bottom;
  return { px0, px1, py0, py1, pw: px1 - px0, ph: py1 - py0 };
}

function drawPA(b) {
  ctx.strokeStyle = 'rgba(120, 110, 100, 0.4)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(b.px0, b.py1); ctx.lineTo(b.px1, b.py1); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(b.px0, b.py0); ctx.lineTo(b.px0, b.py1); ctx.stroke();
}

function drawPXT(b) {
  ctx.fillStyle = 'rgba(90, 80, 70, 0.6)';
  ctx.font = '400 13px "IBM Plex Mono", monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  const range = xHi - xLo;
  const step = range <= 8 ? 1 : range <= 16 ? 2 : 4;
  for (let v = Math.ceil(xLo); v <= Math.floor(xHi); v += step) {
    const tx = b.px0 + ((v - xLo) / (xHi - xLo)) * b.pw;
    ctx.fillText(v, tx, b.py1 + 5);
    ctx.strokeStyle = 'rgba(120, 110, 100, 0.4)';
    ctx.beginPath(); ctx.moveTo(tx, b.py1); ctx.lineTo(tx, b.py1 + 4); ctx.stroke();
  }
}

function pSL(b) {
  if (scanX === null) return;
  const clamped = Math.min(Math.max(scanX, xLo), xHi);
  const sx = b.px0 + ((clamped - xLo) / (xHi - xLo)) * b.pw;
  if (sx >= b.px0 && sx <= b.px1) {
    ctx.strokeStyle = 'rgba(204, 51, 68, 0.4)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(sx, b.py0); ctx.lineTo(sx, b.py1); ctx.stroke();
  }
}

function pValX(b, v) { return b.px0 + ((v - xLo) / (xHi - xLo)) * b.pw; }

// Also draw faint N(0,1) reference in PDF panel
const SQRT2PI = Math.sqrt(2 * Math.PI);
function stdNormalPdf(x) { return Math.exp(-0.5 * x * x) / SQRT2PI; }

// ─── PANEL 1: f(x) ───
function drawPdfInset() {
  const ix = pox(0);
  drawPanelBg(ix, 'rgba(158, 27, 50, 0.2)');
  const b = bnd(ix);

  const peakPdf = tPdf(0);
  const yMax = peakPdf * 1.25;

  ctx.fillStyle = 'rgba(60, 55, 48, 0.7)';
  ctx.font = '500 20px "IBM Plex Mono", monospace';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText('f(x)', ix + PANEL.ip.left, PANEL.iy + 12);

  drawPA(b); drawPXT(b);

  // Peak label
  const peakY = b.py0 + (1 - peakPdf / yMax) * b.ph;
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(90, 80, 70, 0.5)';
  ctx.font = '400 12px "IBM Plex Mono", monospace';
  ctx.fillText(peakPdf.toFixed(3), b.px0 - 5, peakY);

  // Faint N(0,1) reference
  ctx.beginPath();
  for (let i = 0; i <= 300; i++) {
    const xv = xLo + (i / 300) * (xHi - xLo);
    const yv = stdNormalPdf(xv);
    const sx = pValX(b, xv), sy = b.py0 + (1 - yv / yMax) * b.ph;
    i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
  }
  ctx.strokeStyle = 'rgba(95, 106, 114, 0.3)'; ctx.lineWidth = 1.5;
  ctx.setLineDash([5, 4]);
  ctx.stroke();
  ctx.setLineDash([]);
  // Label
  ctx.fillStyle = 'rgba(95, 106, 114, 0.45)';
  ctx.font = '400 13px "IBM Plex Mono", monospace';
  ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
  ctx.fillText('N(0,1)', pValX(b, xHi * 0.45), b.py0 + (1 - stdNormalPdf(xHi * 0.45) / yMax) * b.ph - 6);

  // Shaded area up to scan
  if (scanX !== null) {
    const clipLo = xLo;
    const clipHi = Math.min(Math.max(scanX, xLo), xHi);
    ctx.beginPath();
    for (let i = 0; i <= 200; i++) {
      const xv = clipLo + (i / 200) * (clipHi - clipLo);
      const yv = tPdf(xv);
      const sx = pValX(b, xv), sy = b.py0 + (1 - yv / yMax) * b.ph;
      i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
    }
    ctx.lineTo(pValX(b, clipHi), b.py1);
    ctx.lineTo(b.px0, b.py1);
    ctx.closePath();
    ctx.fillStyle = 'rgba(204, 51, 68, 0.10)';
    ctx.fill();
  }

  // Full t curve
  ctx.beginPath();
  for (let i = 0; i <= 400; i++) {
    const xv = xLo + (i / 400) * (xHi - xLo);
    const yv = tPdf(xv);
    const sx = pValX(b, xv), sy = b.py0 + (1 - yv / yMax) * b.ph;
    i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
  }
  ctx.strokeStyle = 'rgba(158, 27, 50, 0.85)'; ctx.lineWidth = 2.5;
  ctx.stroke();

  ctx.lineTo(b.px1, b.py1); ctx.lineTo(b.px0, b.py1); ctx.closePath();
  ctx.fillStyle = 'rgba(158, 27, 50, 0.04)'; ctx.fill();

  pSL(b);
}

// ─── PANEL 2: F(x) — Pachyderm ───
function drawCdfInset() {
  const ix = pox(1);
  drawPanelBg(ix, 'rgba(95, 106, 114, 0.2)');
  const b = bnd(ix);
  const yMax = 1.08;

  ctx.fillStyle = 'rgba(60, 55, 48, 0.7)';
  ctx.font = '500 20px "IBM Plex Mono", monospace';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText('F(x)', ix + PANEL.ip.left, PANEL.iy + 12);

  drawPA(b); drawPXT(b);

  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(90, 80, 70, 0.6)';
  for (const yt of [0.5, 1.0]) {
    const yy = b.py0 + (1 - yt / yMax) * b.ph;
    ctx.fillText(yt.toFixed(1), b.px0 - 5, yy);
    ctx.setLineDash([4, 5]);
    ctx.strokeStyle = 'rgba(95, 106, 114, 0.18)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(b.px0, yy); ctx.lineTo(b.px1, yy); ctx.stroke();
    ctx.setLineDash([]);
  }

  ctx.beginPath();
  for (let i = 0; i <= 400; i++) {
    const xv = xLo + (i / 400) * (xHi - xLo);
    const Fv = tCdf(xv);
    const sx = pValX(b, xv), sy = b.py0 + (1 - Fv / yMax) * b.ph;
    i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
  }
  ctx.strokeStyle = 'rgba(95, 106, 114, 0.85)'; ctx.lineWidth = 2.5;
  ctx.stroke();

  pSL(b);

  if (scanX !== null) {
    const xc = Math.min(Math.max(scanX, xLo), xHi);
    const Fs = tCdf(xc);
    const dx = pValX(b, xc), dy = b.py0 + (1 - Fs / yMax) * b.ph;
    ctx.beginPath(); ctx.arc(dx, dy, 5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(204, 51, 68, 0.9)'; ctx.fill();

    ctx.fillStyle = 'rgba(95, 106, 114, 0.85)';
    ctx.font = '600 16px "IBM Plex Mono", monospace';
    ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
    ctx.fillText(`F = ${Fs.toFixed(3)}`, b.px0 + b.pw * 0.55, b.py0 + 16);
  }
}

// ─── PANEL 3: F̂(x) — navy ECDF ───
function drawEcdfInset() {
  const ix = pox(2);
  drawPanelBg(ix, 'rgba(30, 80, 160, 0.18)');
  const b = bnd(ix);
  const yMax = 1.08;

  ctx.fillStyle = 'rgba(60, 55, 48, 0.7)';
  ctx.font = '500 20px "IBM Plex Mono", monospace';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText('F̂(x)', ix + PANEL.ip.left, PANEL.iy + 12);

  drawPA(b); drawPXT(b);

  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(90, 80, 70, 0.6)';
  for (const yt of [0.5, 1.0]) {
    const yy = b.py0 + (1 - yt / yMax) * b.ph;
    ctx.fillText(yt.toFixed(1), b.px0 - 5, yy);
    ctx.setLineDash([4, 5]);
    ctx.strokeStyle = 'rgba(30, 80, 160, 0.12)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(b.px0, yy); ctx.lineTo(b.px1, yy); ctx.stroke();
    ctx.setLineDash([]);
  }

  // Faint theoretical CDF (Pachyderm)
  ctx.beginPath();
  for (let i = 0; i <= 200; i++) {
    const xv = xLo + (i / 200) * (xHi - xLo);
    const Fv = tCdf(xv);
    const sx = pValX(b, xv), sy = b.py0 + (1 - Fv / yMax) * b.ph;
    i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
  }
  ctx.strokeStyle = 'rgba(95, 106, 114, 0.2)'; ctx.lineWidth = 1.5;
  ctx.stroke();

  if (scanX === null) return;

  const n = sortedX.length;
  const drawUpTo = Math.min(Math.max(scanX, xLo), xHi);

  let countBelow = 0;
  for (let i = 0; i < n; i++) {
    if (sortedX[i] <= drawUpTo) countBelow = i + 1; else break;
  }

  ctx.beginPath();
  let prevPy = b.py0 + b.ph;
  ctx.moveTo(b.px0, prevPy);

  const maxSteps = 600;
  const stepSize = Math.max(1, Math.floor(countBelow / maxSteps));

  for (let i = 0; i < countBelow; i += stepSize) {
    const xv = sortedX[i];
    if (xv < xLo || xv > xHi) continue;
    const Fhat = (i + 1) / n;
    const sx = pValX(b, xv), sy = b.py0 + (1 - Fhat / yMax) * b.ph;
    ctx.lineTo(sx, prevPy);
    ctx.lineTo(sx, sy);
    prevPy = sy;
  }

  const endPx = pValX(b, drawUpTo);
  ctx.lineTo(endPx, prevPy);
  ctx.strokeStyle = 'rgba(30, 80, 160, 0.85)'; ctx.lineWidth = 2;
  ctx.stroke();

  const Fhat = countBelow / n;
  ctx.beginPath(); ctx.arc(endPx, prevPy, 5.5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(204, 51, 68, 0.9)'; ctx.fill();

  pSL(b);

  ctx.fillStyle = 'rgba(204, 51, 68, 0.9)';
  ctx.font = '600 16px "IBM Plex Mono", monospace';
  ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
  ctx.fillText(`F̂ = ${Fhat.toFixed(3)}`, b.px0 + b.pw * 0.55, b.py0 + 16);
}

// ─── Full render ───
function fullDraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawAxis();
  drawCloudWithScan();
  drawScanLine();
  drawPdfInset();
  drawCdfInset();
  drawEcdfInset();
}

// ─── Scan ───
function startScan() {
  if (scanAnim) cancelAnimationFrame(scanAnim);
  const speed = parseInt(document.getElementById('speedSlider').value);
  const totalFrames = Math.round(400 / speed);
  let frame = 0;
  const s0 = xLo - 0.5, s1 = xHi + 0.5;

  function step() {
    scanX = s0 + (s1 - s0) * (frame / totalFrames);
    fullDraw();
    frame++;
    if (frame <= totalFrames) scanAnim = requestAnimationFrame(step);
    else { scanX = s1; fullDraw(); }
  }
  step();
}

// ─── Controls ───
function updateLabels() {
  const nv = parseInt(document.getElementById('nuSlider').value);
  const ns = parseInt(document.getElementById('nSlider').value);
  document.getElementById('nuVal').textContent = nv;
  document.getElementById('nVal').textContent = ns >= 1000 ? (ns / 1000).toFixed(0) + 'k' : ns;
  document.getElementById('nuLabel').textContent = nv;
  document.getElementById('meanLabel').textContent = nv > 1 ? '0' : 'undef';
  document.getElementById('varLabel').textContent = nv > 2 ? (nv / (nv - 2)).toFixed(3) : (nv > 1 ? '∞' : 'undef');
  const kurt = nv > 4 ? (3 + 6 / (nv - 4)).toFixed(2) : (nv > 2 ? '∞' : 'undef');
  document.getElementById('kurtLabel').textContent = kurt;
}

document.getElementById('nuSlider').addEventListener('input', updateLabels);
document.getElementById('nSlider').addEventListener('input', updateLabels);

document.getElementById('redrawBtn').addEventListener('click', () => {
  if (scanAnim) cancelAnimationFrame(scanAnim);
  scanX = null;
  nu = parseInt(document.getElementById('nuSlider').value);
  N = parseInt(document.getElementById('nSlider').value);
  generateParticles();
  fullDraw();
});

document.getElementById('scanBtn').addEventListener('click', startScan);

// Tooltip
const wrap = document.querySelector('.canvas-wrap');
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const mx = (e.clientX - rect.left) * scaleX;
  const plotW = canvas.width - PAD.left - PAD.right;
  const xVal = xLo + ((mx - PAD.left) / plotW) * (xHi - xLo);
  if (xVal >= xLo && xVal <= xHi) {
    const f = tPdf(xVal);
    const F = tCdf(xVal);
    tooltip.textContent = `x = ${xVal.toFixed(2)}   f(x) = ${f.toFixed(4)}   F(x) = ${F.toFixed(4)}`;
    tooltip.style.left = (e.clientX - wrap.getBoundingClientRect().left + 12) + 'px';
    tooltip.style.top = (e.clientY - wrap.getBoundingClientRect().top - 30) + 'px';
    tooltip.style.opacity = 1;
  } else { tooltip.style.opacity = 0; }
});
canvas.addEventListener('mouseleave', () => { tooltip.style.opacity = 0; });

// Formulas
katex.render(
  String.raw`f(x) = \frac{\Gamma\!\left(\frac{\nu+1}{2}\right)}{\sqrt{\nu\pi}\;\Gamma\!\left(\frac{\nu}{2}\right)}\left(1+\frac{x^2}{\nu}\right)^{\!-\frac{\nu+1}{2}}`,
  document.getElementById('formulaPdf'),
  { throwOnError: false }
);
katex.render(
  String.raw`T = \frac{Z}{\sqrt{V/\nu}},\; Z \sim N(0,1),\; V \sim \chi^2_\nu`,
  document.getElementById('formulaConst'),
  { throwOnError: false }
);
katex.render(
  String.raw`\hat{F}_n(x) = \frac{1}{n}\sum_{i=1}^{n}\mathbf{1}(X_i \leq x)`,
  document.getElementById('formulaEcdf'),
  { throwOnError: false }
);

// Init
generateParticles();
fullDraw();
</script>
