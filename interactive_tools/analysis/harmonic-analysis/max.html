<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardy-Littlewood Maximal Function Explorer</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
            color: #333;
            background-color: #f9f9f9;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            margin-top: 0;
            color: #2c3e50;
        }
        .input-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        label {
            font-weight: bold;
        }
        textarea {
            width: 100%;
            height: 120px;
            font-family: monospace;
            font-size: 1rem;
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #0056b3;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: fit-content;
        }
        button:hover {
            background-color: #004494;
        }
        .help-text {
            font-size: 0.9rem;
            color: #666;
            margin-top: 0.25rem;
        }
        #plot {
            width: 100%;
            height: 600px;
            border: 1px solid #eee;
            border-radius: 4px;
            background: #fff;
        }
        .error {
            color: #dc3545;
            font-weight: bold;
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Hardy-Littlewood Maximal Function</h1>
    <p>Define a simple function by inputting its constant intervals. The tool will analytically compute the upper envelope and reveal the "spiderweb" of candidate hyperbolas underneath.</p>
    
    <div class="input-section">
        <div>
            <label for="functionData">Define Intervals & Heights</label>
            <p class="help-text">Enter one step per line in the format: <strong>Start, End, Height</strong></p>
            <textarea id="functionData">
1, 2, 3
3, 5, 1
6, 7, 2</textarea>
        </div>
        <button onclick="calculateAndPlot()">Calculate & Plot M(f)(x)</button>
        <div id="errorMsg" class="error"></div>
    </div>

    <div id="plot"></div>
</div>

<script>
    function computeMaximalFunction(intervals, heights) {
        // 1. Extract and sort unique breakpoints
        let dSet = new Set();
        intervals.forEach(int => {
            dSet.add(int[0]);
            dSet.add(int[1]);
        });
        let D = Array.from(dSet).sort((a, b) => a - b);
        
        if (D.length === 0) throw new Error("No valid intervals provided.");

        // 2. Define dynamic evaluation grid
        let min_d = D[0];
        let max_d = D[D.length - 1];
        let span = max_d - min_d;
        let pad = span > 0 ? span * 0.5 : 2;
        
        let x_min = min_d - Math.max(pad, 3);
        let x_max = max_d + Math.max(pad, 3);

        let N_grid = 2500;
        let x_grid = [];
        let dx = (x_max - x_min) / (N_grid - 1);
        for(let i = 0; i < N_grid; i++) {
            x_grid.push(x_min + i * dx);
        }

        // 3. Define the step function f(x)
        const f = (x) => {
            let val = 0;
            for(let i = 0; i < intervals.length; i++) {
                if (x >= intervals[i][0] && x < intervals[i][1]) {
                    val += heights[i];
                }
            }
            return val;
        };

        // 4. Define the cumulative integral function F(x)
        const F = (x) => {
            let area = 0;
            for(let i = 0; i < intervals.length; i++) {
                let overlap = Math.max(0, Math.min(x, intervals[i][1]) - intervals[i][0]);
                area += heights[i] * overlap;
            }
            return area;
        };

        // 5. Evaluate the envelope matrix and store candidates
        let f_vals = [];
        let Mf_vals = [];
        
        // Create an array to hold the curve for each breakpoint
        let candidate_curves = Array(D.length).fill(0).map(() => []);

        for(let i = 0; i < N_grid; i++) {
            let x = x_grid[i];
            let local_val = Math.abs(f(x));
            f_vals.push(local_val);
            
            let max_avg = local_val; 
            
            // Check all candidate radii reaching to breakpoints
            for(let j = 0; j < D.length; j++) {
                let r = Math.abs(x - D[j]);
                let avg = local_val; // Default to local value exactly at the breakpoint
                
                if (r > 1e-10) { 
                    avg = (F(x + r) - F(x - r)) / (2 * r);
                }
                
                // Store this specific candidate's value for the background plot
                candidate_curves[j].push(avg);

                if (avg > max_avg) {
                    max_avg = avg;
                }
            }
            Mf_vals.push(max_avg);
        }

        return { x: x_grid, f: f_vals, Mf: Mf_vals, D: D, candidates: candidate_curves, max_height: Math.max(...heights) };
    }

    function calculateAndPlot() {
        const errorMsg = document.getElementById("errorMsg");
        errorMsg.style.display = "none";
        errorMsg.innerText = "";

        try {
            const rawText = document.getElementById("functionData").value;
            const lines = rawText.trim().split('\n');
            
            let intervals = [];
            let heights = [];

            lines.forEach((line, index) => {
                if (line.trim() === '') return; 
                const parts = line.split(',').map(s => parseFloat(s.trim()));
                
                if (parts.length !== 3 || parts.some(isNaN)) {
                    throw new Error(`Invalid format on line ${index + 1}. Expected: Start, End, Height.`);
                }
                if (parts[0] >= parts[1]) {
                    throw new Error(`Invalid interval on line ${index + 1}. Start must be less than End.`);
                }
                
                intervals.push([parts[0], parts[1]]);
                heights.push(parts[2]);
            });

            const data = computeMaximalFunction(intervals, heights);
            
            let traces = [];

            // Add the faint candidate hyperbolas FIRST so they render in the background
            for (let j = 0; j < data.candidates.length; j++) {
                traces.push({
                    x: data.x,
                    y: data.candidates[j],
                    mode: 'lines',
                    // Only show the first one in the legend to avoid clutter
                    name: j === 0 ? 'Candidate Anchors' : '', 
                    showlegend: j === 0,
                    line: { color: 'rgba(231, 76, 60, 0.3)', width: 1.5 },
                    hoverinfo: 'skip' // Skip hover on faint lines so it doesn't distract from the main curves
                });
            }

            // Add the step function
            traces.push({
                x: data.x,
                y: data.f,
                mode: 'lines',
                name: '|f(x)|',
                line: { color: 'black', width: 2, shape: 'hv' } 
            });

            // Add the maximal function envelope on top
            traces.push({
                x: data.x,
                y: data.Mf,
                mode: 'lines',
                name: 'M(f)(x)',
                line: { color: 'blue', width: 3 }
            });

            const layout = {
                title: 'Analytical Envelope of the Maximal Function',
                xaxis: { title: 'x', zeroline: true },
                yaxis: { title: 'Value', rangemode: 'tozero', range: [0, data.max_height + 0.5] },
                hovermode: 'x unified',
                plot_bgcolor: '#fdfdfd'
            };

            Plotly.newPlot('plot', traces, layout, { responsive: true });

        } catch (err) {
            errorMsg.innerText = err.message;
            errorMsg.style.display = "block";
        }
    }

    window.onload = calculateAndPlot;
</script>

</body>
</html>
