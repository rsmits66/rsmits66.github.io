<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banach–Tarski on S²</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #07080d;
    --line: rgba(120, 140, 200, 0.18);
    --line-strong: rgba(160, 180, 230, 0.4);
    --ink: #e8eaf2;
    --ink-dim: #8e96ad;
    --ink-faint: #5a6280;
    --accent: #6892ff;
    --serif: 'EB Garamond', 'Cambria Math', Cambria, serif;
    --mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background:
      radial-gradient(ellipse at 20% 0%, #11162a 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, #1a0d22 0%, transparent 55%),
      var(--bg-0);
    color: var(--ink);
    font-family: var(--serif);
    overflow: hidden;
    height: 100vh;
  }
  canvas { display: block; }

  #ui {
    position: fixed;
    top: 24px; left: 24px;
    width: 360px;
    background: rgba(10, 12, 20, 0.78);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 22px 24px 20px;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }
  .eyebrow {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 6px;
  }
  h1 {
    margin: 0 0 4px 0;
    font-size: 26px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  h1 em { font-style: italic; color: var(--accent); }
  .desc {
    font-size: 14.5px;
    line-height: 1.45;
    color: var(--ink-dim);
    margin: 6px 0 16px 0;
  }
  .desc em { font-style: italic; color: var(--ink); }

  .modes {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 14px;
  }
  button {
    background: transparent;
    color: var(--ink-dim);
    border: 1px solid var(--line);
    padding: 9px 10px;
    border-radius: 1px;
    cursor: pointer;
    font-size: 12px;
    font-family: var(--mono);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: all 0.18s ease;
  }
  button:hover {
    color: var(--ink);
    border-color: var(--line-strong);
    background: rgba(80, 100, 160, 0.08);
  }
  button.active {
    color: #fff;
    border-color: var(--accent);
    background: rgba(104, 146, 255, 0.14);
    box-shadow: inset 0 0 0 1px rgba(104, 146, 255, 0.3);
  }

  .next-btn {
    width: 100%;
    margin: 4px 0 12px 0;
    padding: 12px 14px;
    background: linear-gradient(180deg, rgba(104,146,255,0.22), rgba(104,146,255,0.10));
    border: 1px solid rgba(104,146,255,0.7);
    color: #fff;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 1px;
    transition: all 0.18s;
  }
  .next-btn:hover {
    background: rgba(104,146,255,0.30);
    border-color: #aebfff;
    box-shadow: 0 0 14px rgba(104,146,255,0.25);
  }
  .next-btn.tour-hidden { display: none; }
  .next-btn .nb-sub {
    display: block;
    font-size: 9px;
    letter-spacing: 0.18em;
    color: rgba(255,255,255,0.55);
    margin-top: 3px;
  }

  .progress-wrap {
    margin: 10px 0 14px 0;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--line);
    transition: opacity 0.3s;
  }
  .progress-track {
    height: 2px;
    background: var(--line);
    position: relative;
    overflow: hidden;
  }
  .progress-fill {
    position: absolute;
    top: 0; left: 0; height: 100%;
    background: linear-gradient(90deg, transparent, var(--accent));
    width: 0%;
    transition: width 0.06s linear;
  }
  .phase-labels {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-top: 8px;
  }
  .phase-labels span { transition: color 0.25s; }
  .phase-labels sub { letter-spacing: 0; text-transform: none; }
  .phase-labels span.on { color: var(--accent); }

  #info {
    font-size: 14px;
    line-height: 1.55;
    color: var(--ink);
    min-height: 90px;
  }
  #info .muted { color: var(--ink-dim); font-size: 13px; }
  #info .formula {
    font-family: var(--serif);
    font-style: italic;
    font-size: 15.5px;
    display: block;
    margin: 5px 0;
    color: #d4dcef;
  }
  #info .formula sub, #info .formula sup { font-style: normal; font-family: var(--serif); }
  #info .legend-mini {
    display: flex; flex-wrap: wrap;
    gap: 4px 12px;
    margin-top: 8px;
    font-size: 12px;
  }
  #info .legend-mini .item { display: inline-flex; align-items: center; gap: 6px; }
  #info .legend-mini .dot {
    width: 9px; height: 9px; border-radius: 50%;
    box-shadow: 0 0 6px currentColor;
  }
  .stat {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--line);
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--ink-faint);
    letter-spacing: 0.04em;
    line-height: 1.6;
  }

  .crosshair {
    position: fixed;
    width: 14px; height: 14px;
    border: 1px solid var(--line-strong);
    pointer-events: none;
  }
  .crosshair.tl { top: 12px; left: 12px; border-right: none; border-bottom: none; }
  .crosshair.tr { top: 12px; right: 12px; border-left: none; border-bottom: none; }
  .crosshair.bl { bottom: 12px; left: 12px; border-right: none; border-top: none; }
  .crosshair.br { bottom: 12px; right: 12px; border-left: none; border-top: none; }

  #caption {
    position: fixed;
    bottom: 28px; right: 28px;
    text-align: right;
    font-size: 12px;
    color: var(--ink-faint);
    line-height: 1.6;
    max-width: 260px;
    font-family: var(--mono);
    letter-spacing: 0.03em;
  }
  #caption .formula {
    display: block;
    font-family: var(--serif);
    font-style: italic;
    font-size: 14px;
    color: var(--ink-dim);
    margin-top: 4px;
  }
  #caption .formula .nostyle { font-style: normal; }
  #hint {
    position: fixed;
    bottom: 28px; left: 28px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    pointer-events: none;
    transition: opacity 1s;
  }
  #hint.fade { opacity: 0; }
  @media (max-width: 760px) {
    #ui { width: calc(100vw - 32px); top: 12px; left: 16px; padding: 16px; }
    #caption, .crosshair { display: none; }
  }
</style>
</head>
<body>

<div class="crosshair tl"></div>
<div class="crosshair tr"></div>
<div class="crosshair bl"></div>
<div class="crosshair br"></div>

<canvas id="canvas"></canvas>

<div id="ui">
  <div class="eyebrow">Free action of <span style="font-family:var(--serif); font-style:italic; text-transform:none; letter-spacing:0;">F</span><sub style="text-transform:none;">2</sub> on <span style="font-family:var(--serif); font-style:italic; text-transform:none; letter-spacing:0;">S</span><sup style="text-transform:none;">2</sup></div>
  <h1>Banach–Tarski</h1>
  <div class="desc">Build orbits one by one, choose representatives <em>X</em> from a small cap, then watch the partition emerge.</div>

  <div class="modes">
    <button id="m1" class="active">Replay tour</button>
    <button id="m2">Partition</button>
    <button id="m3">A-copy</button>
    <button id="m4">B-copy</button>
  </div>

  <button id="next-btn" class="next-btn">
    <span id="nb-main">Building orbits…</span>
    <span class="nb-sub" id="nb-sub">space / enter to skip</span>
  </button>

  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="phase-labels">
      <span id="phase-1">build</span>
      <span id="phase-2"><em style="font-style:italic;">X</em></span>
      <span id="phase-3">W<sub>A</sub></span>
      <span id="phase-4">W<sub>B</sub></span>
      <span id="phase-5">W<sub>A⁻¹</sub></span>
      <span id="phase-6">W<sub>B⁻¹</sub></span>
    </div>
  </div>

  <div id="info"></div>

  <div class="stat" id="stat"></div>
</div>

<div id="caption">
  drag · rotate sphere
  <span class="formula">θ = cos<span class="nostyle">⁻¹</span>(⅓) ≈ 70.53°</span>
</div>

<div id="hint">drag to rotate</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ============================================================
// ROTATIONS
// ============================================================
const cT = 1/3;
const sT = 2 * Math.sqrt(2) / 3;
const THETA = Math.acos(1/3);

function rotA(v)  { return [cT*v[0] - sT*v[1], sT*v[0] + cT*v[1], v[2]]; }
function rotAi(v) { return [cT*v[0] + sT*v[1], -sT*v[0] + cT*v[1], v[2]]; }
function rotB(v)  { return [cT*v[0] - sT*v[2], v[1], sT*v[0] + cT*v[2]]; }
function rotBi(v) { return [cT*v[0] + sT*v[2], v[1], -sT*v[0] + cT*v[2]]; }

const fns       = [rotA, rotAi, rotB, rotBi];
const invOf     = [1, 0, 3, 2];

// ============================================================
// REDUCED WORDS in F_2 up to MAX_LEN
// ============================================================
const MAX_LEN = 6;
const words = [[]];
{
  let frontier = [[]];
  for (let len = 1; len <= MAX_LEN; len++) {
    const next = [];
    for (const w of frontier) {
      const last = w.length ? w[w.length - 1] : -1;
      for (let l = 0; l < 4; l++) {
        if (last !== -1 && l === invOf[last]) continue;
        next.push([...w, l]);
      }
    }
    words.push(...next);
    frontier = next;
  }
}
const N = words.length;

function applyWord(word, v) {
  let r = [v[0], v[1], v[2]];
  for (let i = word.length - 1; i >= 0; i--) r = fns[word[i]](r);
  return r;
}
function inverseWord(w) {
  const r = [];
  for (let i = w.length - 1; i >= 0; i--) r.push(invOf[w[i]]);
  return r;
}
function multiplyReduce(w1, w2) {
  const r = [...w1];
  for (const l of w2) {
    if (r.length > 0 && r[r.length - 1] === invOf[l]) r.pop();
    else r.push(l);
  }
  return r;
}

// ============================================================
// 15 BASE POINTS (avoid y- and z-axes)
// ============================================================
function spherePt(theta, phi) {
  return [Math.sin(theta)*Math.cos(phi), Math.sin(theta)*Math.sin(phi), Math.cos(theta)];
}
const basePoints = [
  [1, 0, 0],
  spherePt(0.55, 1.20),
  spherePt(1.65, 2.50),
  spherePt(1.95, 4.55),
  spherePt(0.95, 5.50),
  spherePt(2.45, 0.85),
  spherePt(2.20, 3.65),
  spherePt(1.20, 0.30),
  spherePt(0.85, 3.10),
  spherePt(1.50, 1.80),
  spherePt(2.05, 5.10),
  spherePt(0.70, 4.20),
  spherePt(2.35, 2.20),
  spherePt(1.10, 2.80),
  spherePt(1.85, 0.55),
];
const numBases = basePoints.length;

// 15 distinct hues, golden-angle spaced
function hslRgb(h, s, l) {
  const c = (1 - Math.abs(2*l - 1)) * s;
  const x = c * (1 - Math.abs(((h/60) % 2) - 1));
  const m = l - c/2;
  let r=0,g=0,b=0;
  if (h<60)       { r=c; g=x; b=0; }
  else if (h<120) { r=x; g=c; b=0; }
  else if (h<180) { r=0; g=c; b=x; }
  else if (h<240) { r=0; g=x; b=c; }
  else if (h<300) { r=x; g=0; b=c; }
  else            { r=c; g=0; b=x; }
  return [r+m, g+m, b+m];
}
const baseColors = [];
for (let i = 0; i < numBases; i++) {
  const h = (i * 137.508) % 360;
  baseColors.push(hslRgb(h, 0.78, 0.62));
}

// ============================================================
// CAP — small spherical region from which X is selected
// ============================================================
const capCenterRaw = spherePt(0.95, 0.42);
const cm = Math.hypot(...capCenterRaw);
const capCenter = [capCenterRaw[0]/cm, capCenterRaw[1]/cm, capCenterRaw[2]/cm];
const CAP_ANGLE = 0.30;       // ≈ 17°

// ============================================================
// Build orbits, find representatives, partition labels
// ============================================================
const totalPts = numBases * N;
const positions       = new Float32Array(totalPts * 3);
const orbitColors     = new Float32Array(totalPts * 3);
const partitionColors = new Float32Array(totalPts * 3);
const firstLetters    = new Int8Array(totalPts);
const isRep           = new Uint8Array(totalPts);
const repWordIdx      = new Int32Array(numBases);

const PARTITION_RGB = [
  [1.00, 0.32, 0.40],   // W_A     coral
  [1.00, 0.70, 0.22],   // W_{A⁻¹} amber
  [0.32, 0.62, 1.00],   // W_B     sky
  [0.45, 0.95, 1.00],   // W_{B⁻¹} cyan
];
const ID_RGB = [1.0, 1.0, 1.0];

for (let i = 0; i < numBases; i++) {
  let bestDot = -Infinity, bestW = 0;
  for (let w = 0; w < N; w++) {
    const p = applyWord(words[w], basePoints[i]);
    const idx = i * N + w;
    positions[idx*3]     = p[0];
    positions[idx*3 + 1] = p[1];
    positions[idx*3 + 2] = p[2];

    orbitColors[idx*3]     = baseColors[i][0];
    orbitColors[idx*3 + 1] = baseColors[i][1];
    orbitColors[idx*3 + 2] = baseColors[i][2];

    const dot = p[0]*capCenter[0] + p[1]*capCenter[1] + p[2]*capCenter[2];
    if (dot > bestDot) { bestDot = dot; bestW = w; }
  }
  repWordIdx[i] = bestW;
}

for (let i = 0; i < numBases; i++) {
  const wiInv = inverseWord(words[repWordIdx[i]]);
  for (let w = 0; w < N; w++) {
    const idx = i * N + w;
    const u  = multiplyReduce(words[w], wiInv);
    const fl = u.length === 0 ? -1 : u[0];
    firstLetters[idx] = fl;
    isRep[idx] = (w === repWordIdx[i]) ? 1 : 0;
    const c = (fl === -1) ? ID_RGB : PARTITION_RGB[fl];
    partitionColors[idx*3]     = c[0];
    partitionColors[idx*3 + 1] = c[1];
    partitionColors[idx*3 + 2] = c[2];
  }
}

const positionsBoost = new Float32Array(totalPts * 3);
for (let i = 0; i < totalPts*3; i++) positionsBoost[i] = positions[i] * 1.004;

// ============================================================
// PHASE 1 APPEARANCE TIMES
// ============================================================
const SLOW_COUNT    = 20;
const SLOW_PER_PT   = 0.06;
const FAST_DUR      = 0.55;
const ORBIT_STAGGER = 0.55;
const HOLD_AFTER_P1 = 0.5;
const P_CAP_DUR     = 1.4;   // cap appears, non-cap fades
const P_X_DUR       = 1.5;   // X selected as white reps
const P_PART_DUR    = 1.4;   // each partition piece reveal
const FADE_IN       = 0.13;

// Reveal order: W_A → W_B → W_{A⁻¹} → W_{B⁻¹}
const REVEAL_ORDER = [0, 2, 1, 3];

const appearTimes = new Float32Array(totalPts);
for (let i = 0; i < numBases; i++) {
  const orbitStart = i * ORBIT_STAGGER;
  const slowEnd    = orbitStart + SLOW_COUNT * SLOW_PER_PT;
  for (let w = 0; w < N; w++) {
    const idx = i * N + w;
    appearTimes[idx] = (w < SLOW_COUNT)
      ? orbitStart + w * SLOW_PER_PT
      : slowEnd + ((w - SLOW_COUNT) / (N - SLOW_COUNT)) * FAST_DUR;
  }
}
const P1_DUR = (numBases - 1) * ORBIT_STAGGER + SLOW_COUNT * SLOW_PER_PT + FAST_DUR;
const P1_END   = P1_DUR + HOLD_AFTER_P1;
const P_CAP_END = P1_END   + P_CAP_DUR;
const P_X_END   = P_CAP_END + P_X_DUR;
// Times each partition piece begins / ends, indexed by firstLetter
const partStart = new Array(4);
for (let k = 0; k < 4; k++) partStart[REVEAL_ORDER[k]] = P_X_END + k * P_PART_DUR;
const TOUR_END  = P_X_END + 4 * P_PART_DUR;

// Which points lie in the cap?
const inCap = new Uint8Array(totalPts);
const COS_CAP = Math.cos(CAP_ANGLE);
for (let i = 0; i < totalPts; i++) {
  const dot = positions[i*3]*capCenter[0] + positions[i*3+1]*capCenter[1] + positions[i*3+2]*capCenter[2];
  inCap[i] = (dot >= COS_CAP) ? 1 : 0;
}

// ============================================================
// THREE.JS SCENE
// ============================================================
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(32, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(2.9, 1.7, 3.2);
camera.lookAt(0, 0, 0);

const sphereGroup = new THREE.Group();
scene.add(sphereGroup);

const sphereGeo = new THREE.SphereGeometry(1.0, 80, 40);
sphereGroup.add(new THREE.Mesh(sphereGeo, new THREE.MeshBasicMaterial({
  color: 0x0a1326, transparent: true, opacity: 0.62, side: THREE.BackSide
})));
sphereGroup.add(new THREE.Mesh(sphereGeo, new THREE.MeshBasicMaterial({
  color: 0x0a1326, transparent: true, opacity: 0.16, side: THREE.FrontSide, depthWrite: false
})));

const wire = new THREE.LineSegments(
  new THREE.WireframeGeometry(new THREE.SphereGeometry(1.0, 24, 12)),
  new THREE.LineBasicMaterial({ color: 0x2a3760, transparent: true, opacity: 0.26 })
);
sphereGroup.add(wire);

sphereGroup.add(new THREE.LineLoop(
  (() => {
    const pts = [];
    for (let i = 0; i <= 128; i++) {
      const a = (i/128) * 2*Math.PI;
      pts.push(new THREE.Vector3(Math.cos(a), Math.sin(a), 0));
    }
    return new THREE.BufferGeometry().setFromPoints(pts);
  })(),
  new THREE.LineBasicMaterial({ color: 0x4a5a90, transparent: true, opacity: 0.42 })
));

function axis(color, dir) {
  return new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(0,0,0),
      new THREE.Vector3(...dir).multiplyScalar(1.25),
    ]),
    new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.32 })
  );
}
sphereGroup.add(axis(0xff5555, [1,0,0]));
sphereGroup.add(axis(0x55ff55, [0,1,0]));
sphereGroup.add(axis(0x5599ff, [0,0,1]));

// Cap circle on sphere
function capCircleGeometry(center, angle, segments = 128) {
  const cn = new THREE.Vector3(...center).normalize();
  let u = new THREE.Vector3(0,0,1).cross(cn);
  if (u.length() < 0.05) u = new THREE.Vector3(1,0,0).cross(cn);
  u.normalize();
  const v = new THREE.Vector3().crossVectors(cn, u).normalize();
  const r = Math.sin(angle), h = Math.cos(angle);
  const pts = [];
  for (let i = 0; i <= segments; i++) {
    const a = (i/segments) * 2*Math.PI;
    pts.push(new THREE.Vector3(
      cn.x*h + r*(Math.cos(a)*u.x + Math.sin(a)*v.x),
      cn.y*h + r*(Math.cos(a)*u.y + Math.sin(a)*v.y),
      cn.z*h + r*(Math.cos(a)*u.z + Math.sin(a)*v.z),
    ).multiplyScalar(1.006));
  }
  return new THREE.BufferGeometry().setFromPoints(pts);
}
const capLine = new THREE.Line(
  capCircleGeometry(capCenter, CAP_ANGLE, 160),
  new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0 })
);
sphereGroup.add(capLine);

// Point sprite
function makeCircleTexture() {
  const s = 64, c = document.createElement('canvas');
  c.width = c.height = s;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
  g.addColorStop(0.00, 'rgba(255,255,255,1.00)');
  g.addColorStop(0.30, 'rgba(255,255,255,0.95)');
  g.addColorStop(0.60, 'rgba(255,255,255,0.40)');
  g.addColorStop(1.00, 'rgba(255,255,255,0.00)');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(s/2, s/2, s/2, 0, Math.PI*2); ctx.fill();
  const tex = new THREE.CanvasTexture(c);
  tex.minFilter = THREE.LinearFilter;
  return tex;
}

const ptsGeo = new THREE.BufferGeometry();
ptsGeo.setAttribute('position', new THREE.BufferAttribute(positionsBoost.slice(), 3));
ptsGeo.setAttribute('color',    new THREE.BufferAttribute(new Float32Array(totalPts*3), 3));

const ptsMat = new THREE.PointsMaterial({
  size: 0.026,
  vertexColors: true,
  sizeAttenuation: true,
  transparent: true,
  opacity: 1.0,
  alphaTest: 0.02,
  depthWrite: false,
  map: makeCircleTexture(),
  blending: THREE.AdditiveBlending,
});
const points = new THREE.Points(ptsGeo, ptsMat);
sphereGroup.add(points);

const colorBuf    = ptsGeo.attributes.color.array;
const positionBuf = ptsGeo.attributes.position.array;

// ============================================================
// MOUSE / TOUCH
// ============================================================
let mouseDown = false, mx0 = 0, my0 = 0;
let rotX = 0.18, rotY = 0.30;
let autoRotate = true;
const hintEl = document.getElementById('hint');
function pointerDown(e) {
  mouseDown = true;
  const t = e.touches ? e.touches[0] : e;
  mx0 = t.clientX; my0 = t.clientY;
  autoRotate = false;
  hintEl.classList.add('fade');
}
function pointerUp() { mouseDown = false; }
function pointerMove(e) {
  if (!mouseDown) return;
  const t = e.touches ? e.touches[0] : e;
  rotY += (t.clientX - mx0) * 0.006;
  rotX += (t.clientY - my0) * 0.006;
  rotX = Math.max(-Math.PI/2 + 0.05, Math.min(Math.PI/2 - 0.05, rotX));
  mx0 = t.clientX; my0 = t.clientY;
  if (e.touches) e.preventDefault();
}
canvas.addEventListener('mousedown',  pointerDown);
window.addEventListener('mouseup',    pointerUp);
window.addEventListener('mousemove',  pointerMove);
canvas.addEventListener('touchstart', pointerDown, { passive: false });
window.addEventListener('touchend',   pointerUp);
window.addEventListener('touchmove',  pointerMove, { passive: false });

// ============================================================
// MODE STATE
// ============================================================
let mode = 'tour';
// Tour is a step-through state machine: each stage runs its animation
// until tourTime reaches its end, then pauses for user input.
const STAGE_END_TIMES = [
  P1_END,                                 // 1: build orbits
  P_CAP_END,                              // 2: cap appears, X visible (orbit colors)
  P_X_END,                                // 3: X turns white
  partStart[REVEAL_ORDER[0]] + P_PART_DUR, // 4: W_A · X
  partStart[REVEAL_ORDER[1]] + P_PART_DUR, // 5: W_B · X
  partStart[REVEAL_ORDER[2]] + P_PART_DUR, // 6: W_{A⁻¹} · X
  partStart[REVEAL_ORDER[3]] + P_PART_DUR, // 7: W_{B⁻¹} · X
];
const STAGE_START_TIMES = [0, ...STAGE_END_TIMES.slice(0, -1)];
const NUM_STAGES = STAGE_END_TIMES.length;

let stageIdx     = 1;       // current stage (1..NUM_STAGES)
let tourTime     = 0;
let stagePlaying = true;    // true while animating; false when paused at stage end

function advanceStage() {
  if (stagePlaying) {
    // user wants to skip: snap to end of current stage
    tourTime     = STAGE_END_TIMES[stageIdx - 1];
    stagePlaying = false;
    return;
  }
  // paused: advance to next stage
  if (stageIdx < NUM_STAGES) {
    stageIdx++;
    stagePlaying = true;
  } else {
    // restart
    stageIdx     = 1;
    tourTime     = 0;
    stagePlaying = true;
  }
}

const STAGE_NEXT_LABEL = [
  null,
  'Next: cap &amp; <em style="font-style:italic">X</em>',
  'Next: turn <em style="font-style:italic">X</em> white',
  'Next: W<sub>A</sub>·X &nbsp;(red)',
  'Next: W<sub>B</sub>·X &nbsp;(blue)',
  'Next: W<sub>A⁻¹</sub>·X &nbsp;(amber)',
  'Next: W<sub>B⁻¹</sub>·X &nbsp;(cyan)',
  'Restart tour ↻',
];
function updateNextButton() {
  const main = document.getElementById('nb-main');
  const sub  = document.getElementById('nb-sub');
  const btn  = document.getElementById('next-btn');
  if (mode !== 'tour') { btn.classList.add('tour-hidden'); return; }
  btn.classList.remove('tour-hidden');
  if (stagePlaying) {
    main.innerHTML = 'Skip ▸';
    sub.textContent = 'animation in progress';
  } else if (stageIdx < NUM_STAGES) {
    main.innerHTML = STAGE_NEXT_LABEL[stageIdx + 1] || 'Continue ▸';
    sub.textContent = 'press space / enter';
  } else {
    main.innerHTML = 'Restart tour ↻';
    sub.textContent = 'press space / enter';
  }
}
let copyTime = 0;
const animPositions = new Float32Array(totalPts * 3);

function clamp(x, a, b) { return x < a ? a : (x > b ? b : x); }
function lerp(a, b, t)  { return a + (b - a) * t; }

function rotateZ(x, y, z, a) { const c=Math.cos(a), s=Math.sin(a); return [c*x - s*y, s*x + c*y, z]; }
function rotateY(x, y, z, a) { const c=Math.cos(a), s=Math.sin(a); return [c*x + s*z, y, -s*x + c*z]; }

// --- Tour rendering ---
function renderTourFrame(t) {
  // Cap fades in during P_CAP, stays after
  let capOpacity = 0;
  if (t < P1_END) capOpacity = 0;
  else if (t < P_CAP_END) capOpacity = ((t - P1_END) / P_CAP_DUR) * 0.85;
  else capOpacity = 0.85;
  capLine.material.opacity = capOpacity;

  for (let i = 0; i < totalPts; i++) {
    let r, g, b;

    if (t < P1_END) {
      // PHASE 1: orbit-colored fade-in
      const a = clamp((t - appearTimes[i]) / FADE_IN, 0, 1);
      r = orbitColors[i*3]     * a;
      g = orbitColors[i*3 + 1] * a;
      b = orbitColors[i*3 + 2] * a;
    }
    else if (t < P_CAP_END) {
      // CAP PHASE: outside-cap points fade to dim, in-cap stay bright
      const tt = clamp((t - P1_END) / P_CAP_DUR, 0, 1);
      const e  = tt*tt*(3-2*tt);
      const f  = inCap[i] ? 1.0 : (1 - 0.92 * e);
      r = orbitColors[i*3]     * f;
      g = orbitColors[i*3 + 1] * f;
      b = orbitColors[i*3 + 2] * f;
    }
    else if (t < P_X_END) {
      // X PHASE: in-cap reps brighten to white; in-cap non-reps fade out
      const tt = clamp((t - P_CAP_END) / P_X_DUR, 0, 1);
      const e  = tt*tt*(3-2*tt);
      if (!inCap[i]) {
        r = orbitColors[i*3]     * 0.08;
        g = orbitColors[i*3 + 1] * 0.08;
        b = orbitColors[i*3 + 2] * 0.08;
      } else if (isRep[i]) {
        r = lerp(orbitColors[i*3],     1, e);
        g = lerp(orbitColors[i*3 + 1], 1, e);
        b = lerp(orbitColors[i*3 + 2], 1, e);
      } else {
        const f = 1 - 0.92 * e;
        r = orbitColors[i*3]     * f;
        g = orbitColors[i*3 + 1] * f;
        b = orbitColors[i*3 + 2] * f;
      }
    }
    else {
      // PARTITION REVEAL PHASES: each piece lights up in turn
      if (isRep[i]) {
        r = 1; g = 1; b = 1;
      } else {
        const fl = firstLetters[i];
        const ps = partStart[fl];
        const tt = clamp((t - ps) / P_PART_DUR, 0, 1);
        const e  = tt*tt*(3-2*tt);
        const dimR = orbitColors[i*3]     * 0.08;
        const dimG = orbitColors[i*3 + 1] * 0.08;
        const dimB = orbitColors[i*3 + 2] * 0.08;
        const pc = PARTITION_RGB[fl];
        r = lerp(dimR, pc[0], e);
        g = lerp(dimG, pc[1], e);
        b = lerp(dimB, pc[2], e);
      }
    }

    colorBuf[i*3]     = r;
    colorBuf[i*3 + 1] = g;
    colorBuf[i*3 + 2] = b;
  }
  ptsGeo.attributes.color.needsUpdate = true;
  positionBuf.set(positionsBoost);
  ptsGeo.attributes.position.needsUpdate = true;

  // Progress
  const progFrac = clamp(t / TOUR_END, 0, 1);
  document.getElementById('progress-fill').style.width = (progFrac * 100) + '%';
  // Active phase label
  const labels = ['phase-1','phase-2','phase-3','phase-4','phase-5','phase-6'];
  labels.forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('on');
    el.style.color = '';
  });
  let active = 0;
  if      (t < P1_END)     active = 0;
  else if (t < P_X_END)    active = 1;
  else if (t < partStart[REVEAL_ORDER[1]]) active = 2;
  else if (t < partStart[REVEAL_ORDER[2]]) active = 3;
  else if (t < partStart[REVEAL_ORDER[3]]) active = 4;
  else active = 5;
  document.getElementById(labels[active]).style.color = 'var(--accent)';

  setTourInfo(t);
}

function setTourInfo(t) {
  const el = document.getElementById('info');
  if (stageIdx === 1) {
    if (stagePlaying) {
      const elapsed = Math.min(t, P1_DUR);
      const cur = Math.min(numBases - 1, Math.floor(elapsed / ORBIT_STAGGER));
      el.innerHTML = `
        <div class="muted">Building orbit <em>F</em><sub>2</sub>·<em>v</em><sub>${cur}</sub>. Each new dot is <em>w</em>·<em>v</em><sub>${cur}</sub> for the next reduced word <em>w</em>.</div>
        <span class="formula">F<sub>2</sub>·<em>v</em><sub>i</sub> = { <em>w</em>·<em>v</em><sub>i</sub> : <em>w</em> ∈ F<sub>2</sub> }</span>`;
    } else {
      el.innerHTML = `
        <div class="muted">All ${numBases} orbits drawn — ${totalPts.toLocaleString()} points across <em>S</em>².</div>
        <span class="formula">Each orbit is a faithful copy of F<sub>2</sub>.</span>
        <div class="muted" style="color:#cfd6ee;">Press <em style="font-style:italic;">Next</em> to choose representatives.</div>`;
    }
  }
  else if (stageIdx === 2) {
    el.innerHTML = `
      <div style="color:#fff; font-size:15px; line-height:1.4; margin-bottom:6px; font-style:italic;">Selecting with Axiom of Choice representatives.</div>
      <div class="muted">A small cap <em>C</em> appears on <em>S</em>². The points inside <em>C</em> — one per orbit — are <em>X</em>, shown here in their original orbit colors.</div>
      <span class="formula">X = { r<sub>0</sub>, …, r<sub>14</sub> } &nbsp;⊂&nbsp; C</span>`;
  }
  else if (stageIdx === 3) {
    el.innerHTML = `
      <div style="color:#fff; font-size:15px; line-height:1.4; margin-bottom:6px; font-style:italic;">X — the chosen set.</div>
      <div class="muted">All 15 representatives recolored white. The choice itself is non-constructive: no formula picks one point per orbit, so this step is exactly what AC supplies.</div>`;
  }
  else if (stageIdx === 4) {
    el.innerHTML = `
      <span class="formula" style="color:#ff5266; font-size:18px;">W<sub>A</sub>·X</span>
      <div class="muted">The image of <em>X</em> under every reduced word beginning with <em>A</em>. These points lie all over <em>S</em>² — one piece of the partition.</div>`;
  }
  else if (stageIdx === 5) {
    el.innerHTML = `
      <span class="formula" style="color:#529eff; font-size:18px;">W<sub>B</sub>·X</span>
      <div class="muted">Image of <em>X</em> under reduced words beginning with <em>B</em>.</div>`;
  }
  else if (stageIdx === 6) {
    el.innerHTML = `
      <span class="formula" style="color:#ffb338; font-size:18px;">W<sub>A⁻¹</sub>·X</span>
      <div class="muted">Image of <em>X</em> under reduced words beginning with <em>A⁻¹</em>.</div>`;
  }
  else if (stageIdx === 7) {
    if (stagePlaying) {
      el.innerHTML = `
        <span class="formula" style="color:#73f2ff; font-size:18px;">W<sub>B⁻¹</sub>·X</span>
        <div class="muted">Image of <em>X</em> under reduced words beginning with <em>B⁻¹</em>.</div>`;
    } else {
      el.innerHTML = `
        <span class="formula">S² = X ⊔ W<sub>A</sub>·X ⊔ W<sub>A⁻¹</sub>·X ⊔ W<sub>B</sub>·X ⊔ W<sub>B⁻¹</sub>·X</span>
        <div class="muted">Five disjoint pieces. Each non-rep point <em>p</em> = <em>u</em>·<em>r</em><sub>i</sub> takes its color from the first letter of <em>u</em>.</div>
        <div class="legend-mini">
          <span class="item"><span class="dot" style="background:#fff;color:#fff"></span><em style="font-style:italic">X</em></span>
          <span class="item"><span class="dot" style="background:rgb(255,82,102);color:rgb(255,82,102)"></span><em style="font-style:italic">W<sub>A</sub></em></span>
          <span class="item"><span class="dot" style="background:rgb(82,158,255);color:rgb(82,158,255)"></span><em style="font-style:italic">W<sub>B</sub></em></span>
          <span class="item"><span class="dot" style="background:rgb(255,179,56);color:rgb(255,179,56)"></span><em style="font-style:italic">W<sub>A⁻¹</sub></em></span>
          <span class="item"><span class="dot" style="background:rgb(115,242,255);color:rgb(115,242,255)"></span><em style="font-style:italic">W<sub>B⁻¹</sub></em></span>
        </div>`;
    }
  }
}

function renderPartitionStatic() {
  for (let i = 0; i < totalPts; i++) {
    if (isRep[i]) {
      colorBuf[i*3] = 1; colorBuf[i*3 + 1] = 1; colorBuf[i*3 + 2] = 1;
    } else {
      colorBuf[i*3]     = partitionColors[i*3];
      colorBuf[i*3 + 1] = partitionColors[i*3 + 1];
      colorBuf[i*3 + 2] = partitionColors[i*3 + 2];
    }
  }
  ptsGeo.attributes.color.needsUpdate = true;
  positionBuf.set(positionsBoost);
  ptsGeo.attributes.position.needsUpdate = true;
  capLine.material.opacity = 0.85;
  setTourInfo(TOUR_END);
  document.getElementById('progress-fill').style.width = '100%';
  ['phase-1','phase-2','phase-3','phase-4','phase-5'].forEach(id => {
    const el = document.getElementById(id); if (el) { el.classList.remove('on'); el.style.color = ''; }
  });
  const last = document.getElementById('phase-6'); if (last) last.style.color = 'var(--accent)';
}

function copyTimeline(t) {
  const T = t % 9.0;
  let p = 0, f = 0;
  if      (T < 1.0)  { p = 0;             f = 0; }
  else if (T < 2.5)  { p = 0;             f = (T - 1.0) / 1.5; }
  else if (T < 4.7)  { p = (T - 2.5)/2.2; f = 1; }
  else if (T < 6.7)  { p = 1;             f = 1; }
  else if (T < 7.7)  { p = 1 - (T-6.7);   f = 1; }
  else               { p = 0;             f = 1 - (T - 7.7) / 1.3; }
  return { p, f, phase: T };
}

function renderCopy(letter, p, f) {
  const useFL  = (letter === 'A') ? 1 : 3;
  const stayFL = (letter === 'A') ? 0 : 2;
  const angle  = (letter === 'A') ?  p*THETA : -p*THETA;
  const rotFn  = (letter === 'A') ? rotateZ : rotateY;

  for (let i = 0; i < totalPts; i++) {
    const fl = firstLetters[i];
    const x = positionsBoost[i*3], y = positionsBoost[i*3+1], z = positionsBoost[i*3+2];
    if (fl === useFL) {
      const r = rotFn(x, y, z, angle);
      animPositions[i*3]     = r[0];
      animPositions[i*3 + 1] = r[1];
      animPositions[i*3 + 2] = r[2];
    } else {
      animPositions[i*3]     = x;
      animPositions[i*3 + 1] = y;
      animPositions[i*3 + 2] = z;
    }

    const baseC   = isRep[i] ? ID_RGB : ((fl === -1) ? ID_RGB : PARTITION_RGB[fl]);
    const visible = (fl === useFL) || (fl === stayFL) || isRep[i];
    const a = visible ? 1.0 : (1 - 0.88 * f);
    colorBuf[i*3]     = baseC[0]*a + 0.04*(1-a);
    colorBuf[i*3 + 1] = baseC[1]*a + 0.04*(1-a);
    colorBuf[i*3 + 2] = baseC[2]*a + 0.04*(1-a);
  }
  positionBuf.set(animPositions);
  ptsGeo.attributes.position.needsUpdate = true;
  ptsGeo.attributes.color.needsUpdate = true;
}

function setCopyInfo(letter, T) {
  const Lp  = letter, Lpi = letter + '⁻¹';
  const W   = (s) => `W<sub style="font-style:normal">${s}</sub>`;
  const fmt = (s) => `<span class="formula">${s}</span>`;
  const el  = document.getElementById('info');
  if (T < 1.0)
    el.innerHTML = `<div class="muted">The five-piece partition of <em>S</em>² (modulo a measure-zero set).</div>`;
  else if (T < 2.5)
    el.innerHTML = `<div class="muted">Highlight only <em>X</em>, ${W(Lp)}·<em>X</em>, and ${W(Lpi)}·<em>X</em>; dim the rest.</div>`;
  else if (T < 4.7)
    el.innerHTML = `<div class="muted">Apply <em>${Lp}</em> to ${W(Lpi)}·<em>X</em>.</div>`;
  else if (T < 6.7)
    el.innerHTML = `<div class="muted">In F<sub>2</sub>:</div>
      ${fmt(`F<sub>2</sub> = ${W(Lp)} ⊔ ${Lp}·${W(Lpi)}`)}
      <div class="muted">Two pieces of the original five recover <em>S</em>² entirely. Together with the analogous decomposition for <em>${letter==='A'?'B':'A'}</em>, this is the duplication.</div>`;
  else if (T < 7.7)
    el.innerHTML = `<div class="muted">…undo rotation.</div>`;
  else
    el.innerHTML = `<div class="muted">…restore faded pieces.</div>`;
}

// ============================================================
// MODE BUTTONS
// ============================================================
function setActive(id) {
  document.querySelectorAll('.modes button').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
document.getElementById('m1').onclick = () => {
  mode = 'tour'; stageIdx = 1; tourTime = 0; stagePlaying = true; setActive('m1');
  document.getElementById('progress-wrap').style.opacity = '1';
  document.getElementById('next-btn').classList.remove('tour-hidden');
};
document.getElementById('m2').onclick = () => {
  mode = 'partition'; setActive('m2');
  document.getElementById('progress-wrap').style.opacity = '0.4';
  document.getElementById('next-btn').classList.add('tour-hidden');
  renderPartitionStatic();
};
document.getElementById('m3').onclick = () => {
  mode = 'copy-A'; copyTime = 0; setActive('m3');
  document.getElementById('progress-wrap').style.opacity = '0.4';
  document.getElementById('next-btn').classList.add('tour-hidden');
};
document.getElementById('m4').onclick = () => {
  mode = 'copy-B'; copyTime = 0; setActive('m4');
  document.getElementById('progress-wrap').style.opacity = '0.4';
  document.getElementById('next-btn').classList.add('tour-hidden');
};

document.getElementById('next-btn').onclick = advanceStage;
window.addEventListener('keydown', (e) => {
  if (mode !== 'tour') return;
  if (e.code === 'Space' || e.code === 'Enter' || e.code === 'ArrowRight') {
    e.preventDefault();
    advanceStage();
  }
});

document.getElementById('stat').innerHTML =
  `${totalPts.toLocaleString()} points · ${N.toLocaleString()} reduced words / orbit · |w| ≤ ${MAX_LEN}<br>` +
  `${numBases} orbits · cap radius ≈ ${(CAP_ANGLE * 180/Math.PI).toFixed(1)}°`;

// ============================================================
// RENDER LOOP
// ============================================================
let lastT = performance.now();
function frame() {
  requestAnimationFrame(frame);
  const now = performance.now();
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;

  if (mode === 'tour') {
    if (stagePlaying) {
      tourTime += dt;
      const stageEnd = STAGE_END_TIMES[stageIdx - 1];
      if (tourTime >= stageEnd) {
        tourTime = stageEnd;
        stagePlaying = false;
      }
    }
    renderTourFrame(tourTime);
    updateNextButton();
  } else if (mode === 'partition') {
    capLine.material.opacity = 0.85;
  } else if (mode === 'copy-A') {
    copyTime += dt;
    const { p, f, phase } = copyTimeline(copyTime);
    renderCopy('A', p, f);
    capLine.material.opacity = 0.85;
    setCopyInfo('A', phase);
  } else if (mode === 'copy-B') {
    copyTime += dt;
    const { p, f, phase } = copyTimeline(copyTime);
    renderCopy('B', p, f);
    capLine.material.opacity = 0.85;
    setCopyInfo('B', phase);
  }

  if (autoRotate) rotY += dt * 0.13;
  sphereGroup.rotation.y = rotY;
  sphereGroup.rotation.x = rotX;

  renderer.render(scene, camera);
}
frame();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
